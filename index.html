translations.ko.luthierData = [
    { name: "Marleaux Basses", country: "독일", region: "europe", tags: ["Wood", "Structure", "Aesthetics", "Customization", "Ergonomics", "Electronics"],
        summary: "Marleaux의 접근 방식은 옛 장인정신과 목재 전문 지식을 미래 지향적인 지속 가능성 및 기술과 융합합니다. RTW 인증 지역 목재 및 VARI 공정과 같은 아이디어를 옹호함으로써 Marleaux는 단순한 고품질 악기를 넘어 환경적 책임과 기술 혁신을 정체성의 핵심 부분으로 나타내는 브랜드로 발돋움합니다.",
        details: `<p>1990년부터 Marleaux BassGuitars는 목재와 완벽에 대한 열정으로 최고의 수제 베이스를 제작해 왔습니다. Marleaux는 숨 막힐 듯한 부티크 톤우드 컬렉션을 유지하며 각 조각이 적절하게 숙성되고 음향적으로 최적화되도록 보장합니다.</p><p>특히 Marleaux는 <strong>REGIO TONE WOOD (RTW)</strong> 이니셔티브를 도입하여 인증된 지역 목재를 기후 중립적인 방식으로 조달하여 추가 비용 없이 친환경적인 양심으로 이국적인 품질을 제공합니다. 기술적으로는 클라우스탈 공과대학과 협력하여 목재 특성을 향상시키기 위해 천연 섬유를 사용하는 <strong>VARI 처리</strong>를 개발하여 2025년 기술 이전상을 수상했습니다.</p><p>대표 모델인 <strong>Consat</strong>은 전통적인 탁월함을 보여줍니다: 엄선된 탑이 있는 투피스 바디, 6볼트 조인트로 고정된 매우 안정적인 3피스 메이플 넥, 24프렛과 제로 프렛이 있는 에보니 지판, 그리고 Marleaux 3밴드 EQ가 장착된 맞춤형 Delano 쿼드코일 픽업으로 정의되면서도 다재다능한 사운드 팔레트를 제공합니다.</p>` },
    { name: "Jens Ritter Instruments", country: "독일", region: "europe", tags: ["Aesthetics", "Customization", "Wood"],
        summary: "Ritter의 악기는 독특한 개인적 서사를 가진 가보 예술품으로 제작됩니다. 호화로운 재료와 스토리텔링을 각 제작에 통합함으로써 Ritter는 베이스를 미술품으로 승격시킵니다. 극히 제한된 생산과 박물관의 인정은 순수한 연주를 넘어서는 그들의 독점성과 문화적 가치를 강화합니다.",
        details: `<p>Jens Ritter는 매년 120개 미만의 악기를 생산하는 마스터 루씨어로, 각각이 예술적 걸작입니다. 17세기 와이너리를 개조한 작업실에서 작업하며, 그는 제작 과정에 깊은 개인적 영감을 불어넣어 마치 "노래를 쓰는 것"과 같다고 비유합니다.</p><p>그의 유명한 <strong>J-Collection</strong>은 이 예술 철학을 잘 보여주며, 단순한 음악 도구를 넘어 수집 가능한 예술품이 됩니다. Ritter는 희귀한 목재, 귀한 보석, 실험적인 마감과 같은 비범한 재료를 사용합니다. 예를 들어, <strong>“The Paraiba Velvet”</strong> 베이스는 악어 질감의 벨벳, 완벽한 다이아몬드가 세팅된 18k 화이트 골드 인레이, 그리고 파라이바 토르말린으로 장식된 컨트롤 노브를 특징으로 합니다.</p><p>기능적 예술로서의 지위를 확인시켜주듯, Ritter의 작품은 메트로폴리탄 미술관, 스미소니언 박물관, 보스턴 미술관 등 세 개의 주요 미국 미술관에 소장된 유일한 일렉트릭 기타입니다.</p>` },
    { name: "LeFay", country: "독일", region: "europe", tags: ["Structure", "Electronics", "Ergonomics"],
        summary: "LeFay의 핵심 강점은 제품에 대한 완전한 통제입니다. 모든 중요한 하드웨어와 전자 부품을 자체 제작함으로써 부품 간의 완벽한 시너지를 이룹니다. 이는 LeFay 베이스에 기성 부품으로는 얻을 수 없는 독특한 특성을 부여하고 기술적 완벽성에 대한 명성을 쌓게 합니다.",
        details: `<p>30년 이상 동안 LeFay는 베이스 제작에서 독일의 정밀 엔지니어링을 보여주었습니다. 그들의 철학은 <strong>전체론적 통합</strong>입니다: 독점 픽업과 견고한 브릿지부터 맞춤형 전자 회로에 이르기까지 거의 모든 구성 요소가 원활하게 함께 작동하도록 사내에서 설계 및 제조됩니다.</p><p>LeFay 베이스의 특징은 <strong>매우 뻣뻣한 넥 구조</strong>입니다. 종종 파덕과 같은 단단한 경재로 만들어지고 탄소 섬유로 보강되어 넥은 뒤틀림에 강하고, 이는 데드 스팟을 제거하고 지속적으로 낮은 액션을 가능하게 합니다. “Singer”와 같은 일부 모델에는 바디에 직접 통합된 조절 가능한 슬랩 램프와 같은 영리한 기능도 포함되어 있습니다.</p>` },
    { name: "Sandberg Guitars", country: "독일", region: "europe", tags: ["Aesthetics", "Wood", "Structure"],
        summary: "Sandberg의 혁신은 미적 에이징과 기능적 향상을 결합하는 데 있습니다. Hardcore Aged Masterpiece 베이스는 예술적으로 렐릭 처리되었을 뿐만 아니라 Thermo 및 진동 에이징을 통해 음향적으로 향상되어 빈티지 악기의 즉각적인 분위기와 함께 우수한 성능을 제공합니다.",
        details: `<p>Sandberg Guitars는 새로운 악기를 오랫동안 사랑받은 빈티지 제품처럼 보이게 하고 느끼게 하는 숙련된 <strong>에이징 공정</strong>으로 유명합니다. 그들은 <strong>Hardcore Aged Masterpiece</strong>로 절정을 이루는 네 가지 레벨의 에이징을 제공합니다.</p><p>이 시리즈는 단지 외관에 관한 것이 아닙니다. Sandberg는 목재의 톤을 향상시키기 위해 특별한 처리를 합니다. 그들의 <strong>Thermo Treatment</strong>는 수십 년의 자연 노화를 모방하여 목재를 열처리하여 서스테인과 반응을 개선합니다. 또한, <strong>Vibration Treatment</strong>는 장기간의 연주를 시뮬레이션하여 톤의 성숙도를 더욱 풍부하게 하고 새로운 베이스에 오래된 악기의 공명과 안정성을 부여합니다.</p>` },
    { name: "Vincent Bass Guitars", country: "독일", region: "europe", tags: ["Structure", "Ergonomics", "Wood", "Electronics"],
        summary: "Vincent Bass Guitars는 전통적으로 상반되는 두 가지 특성인 가벼운 무게와 풍부한 톤을 훌륭하게 조화시킵니다. 허니컴 챔버링과 다른 엔지니어링 조정을 통해 혁신함으로써 Vincent는 연주자들이 요구하는 풍부한 사운드를 희생하지 않으면서 인체 공학적 편안함을 제공하고, 영리하고 친환경적인 디자인으로 빈티지 분위기를 격상시킵니다.",
        details: `<p>루씨어 요하네스 푈만이 이끄는 Vincent Bass Guitars는 <strong>“TRUE TONE”</strong>을 추구하는 철학 아래 클래식 아메리칸 디자인과 현대 독일 혁신을 결합합니다. 그 핵심에는 독창적인 <strong>허니컴 챔버링</strong> 기술이 있습니다. 단순한 속 파기 대신 바디 내부에 벌집 모양의 격자를 조각하여 무게를 극적으로 줄이면서(약 3.6kg) 솔리드 바디 악기의 펀치와 서스테인을 유지하는 단단한 코어를 남깁니다.</p><p>“톤 손상 없는 경량화” 추구는 듀얼 그래파이트 트러스로드, 제로 프렛, 그리고 서스테인을 향상시키기 위한 세미 스트링스루 브릿지 디자인으로 보완됩니다. 지속 가능성 또한 핵심이며, 지역 목재를 선호하고 작업장을 100% 수력 에너지로 가동합니다.</p>` },
    { name: "Warwick Basses", country: "독일", region: "europe", tags: ["Wood", "Structure", "Customization"],
        summary: "Warwick의 웬지 목재 채택은 단순한 재료 선택 이상이었습니다. 그것은 Warwick 사운드와 브랜드 이미지의 초석이 되었습니다. 동시에, 그들의 선구적인 환경 이니셔티브(FSC 목재 및 탄소 중립 생산 등)는 회사를 현대적 가치와 일치시켜, 지구를 해치지 않는 세계적 수준의 톤을 성공적으로 마케팅합니다.",
        details: `<p>Warwick은 부티크 베이스 세계의 거인으로, 이국적인 톤우드와 지속 가능성에 대한 헌신으로 유명합니다. 결정적인 요소는 1980년대에 대중화시킨 넥용 서아프리카산 <strong>웬지</strong> 목재 사용입니다. 웬지의 강성과 날카로운 반응은 Warwick 베이스에 시그니처인 그르렁거림과 분명한 중음을 부여했습니다.</p><p>환경 분야에서 Warwick은 업계 선두 주자입니다. 모든 제조는 “그린하우스” 공장에서 <strong>탄소 중립 공정</strong>으로 이루어지며, FSC 인증 지속 가능한 목재만을 사용합니다. 그들의 비즈니스 모델은 또한 세 가지 계층으로 넓은 시장을 공략합니다: 완전 맞춤형 <strong>Custom Shop Masterbuilt</strong>, 더 접근하기 쉬운 독일산 <strong>Teambuilt Pro Series</strong>, 그리고 보급형 <strong>RockBass</strong> 라인.</p>` },
    { name: "KD Basses", country: "불가리아", region: "europe", tags: ["Structure", "Wood", "Aesthetics"],
        summary: "KD Basses는 기술적 문제 해결과 예술적 창의성의 융합을 보여줍니다. 콘 코어 넥은 악기의 근본적인 수명과 성능을 다루고, 안정화된 유색 목재의 사용은 새로운 미적 경계를 엽니다. 시각적이고 개인적인 손길을 희생하지 않으면서 높은 수준의 악기 제작 과학을 보여주는 브랜드입니다.",
        details: `<p>콘스탄틴 디미트로프가 이끄는 KD Basses는 혁신적인 솔루션으로 유명합니다. 대표적인 예는 넥의 바깥쪽 부분을 연속적인 나무결로 보강하여 안정성을 대폭 향상시키고 뒤틀림 가능성을 약 70% 줄이는 <strong>콘 코어 넥 구조</strong>입니다.</p><p>또 다른 혁신은 목재를 수지로 주입하여 더 단단하고 방수성이 있으며 환경 변화에 영향을 받지 않도록 하는 <strong>안정화 목재</strong> 사용입니다. 이는 만화경 같은 벌 메이플 탑과 다색의 안정화된 모자이크 지판을 특징으로 하는 <strong>“피카소” 베이스</strong>에서 유명하게 시연된 극적인 색상 표현도 가능하게 합니다.</p>` },
    { name: "Dingwall Guitars", country: "캐나다", region: "other", tags: ["Structure", "Electronics", "Ergonomics"],
        summary: "딩월은 베이스 기타의 근본적인 물리적 과제인 현의 불균일한 장력과 톤 반응을 과학 기반 설계를 통해 해결했습니다. 멀티스케일 악기를 주류에 도입함으로써 딩월은 특히 타이트한 로우 B와 명료한 톤이 중요한 장르에서 새로운 표준을 세웠습니다.",
        details: `<p>쉘든 딩월이 설립한 Dingwall Guitars는 <strong>멀티스케일 또는 팬프렛 시스템</strong>을 생산 수준에서 구현하여 베이스 디자인을 혁신했습니다. 아이디어는 각 현마다 다른 최적의 스케일 길이를 갖는 것입니다 - 낮은 현은 더 길고(로우 B의 경우 종종 37인치), 높은 현은 더 짧습니다(G의 경우 약 34인치).</p><p>그 이점은 즉각적입니다: 로우 B 현은 장력과 선명도를 얻어 흐릿한 톤을 제거합니다. 모든 현에 걸쳐 균형 잡힌 장력이 달성되고, 각 현의 길이가 음높이에 이상적이기 때문에 인토네이션이 향상됩니다. 딩월은 이를 맞춤 설계된 각진 픽업과 고음질 액티브 회로로 보완하여 팬프렛 디자인이 만들어내는 확장된 선명도를 보존합니다.</p>` },
    { name: "Padalka Guitars", country: "캐나다", region: "other", tags: ["Wood", "Aesthetics", "Structure"],
        summary: "Padalka Guitars는 목재를 단순한 건축 자재에서 악기의 원동력으로 승격시킵니다. 목재 선택, 건조 및 안정화에 에너지를 쏟음으로써 Padalka는 기초가 완벽하도록 보장하여 탁월한 특성과 수명을 가진 베이스를 생산하며, 각 디자인은 목재 자체에서 탄생합니다.",
        details: `<p>드미트리 파달카가 운영하는 Padalka Guitars는 핵심 원칙에 따라 운영됩니다: <strong>목재가 디자인을 이끌게 하라</strong>. 고정된 청사진 대신, 파달카는 톤우드를 연구하여 그들의 결과 특성이 악기의 형태에 영감을 주도록 합니다.</p><p>이를 실행하기 위해 파달카는 목재 준비에 엄청난 노력을 투자하여, 통제된 습도 환경에서 목재를 수년간 천천히 <strong>건조하고 적응</strong>시킵니다. 파달카는 조달한 목재의 약 50%만 사용하며, 건조 후 기준에 미달하는 모든 판자를 거부한다고 합니다. 이 세심한 과정은 안정성과 "살아있는" 톤 특성으로 유명한 악기를 만들어냅니다.</p>` },
    { name: "Alusonic Aluminium Instruments", country: "이탈리아", region: "europe", tags: ["Structure", "Aesthetics", "Electronics"],
        summary: "Alusonic의 가치 제안은 비전통적인 재료를 활용하여 독특한 톤 및 성능 우위를 달성하는 것입니다. 알루미늄을 사용함으로써 Alusonic 베이스는 안정성과 명확하고 지속적인 톤을 제공하여 차별화되며, 목재를 넘어서 생각함으로써 궁극의 선명도, 서스테인 및 안정성을 갖춘 악기를 만들 수 있음을 증명합니다.",
        details: `<p>이탈리아의 안드레아 발라리니가 설립한 Alusonic은 <strong>항공기 등급 알루미늄</strong>으로 악기를 제작하여 전통에서 벗어납니다. 알루미늄은 습도 및 온도 문제에 대한 내성을 제공하고 독특한 음향 특성에 기여합니다: 피아노 같은 선명도와 따뜻함이 조화를 이룹니다.</p><p>Alusonic은 전체 알루미늄 및 하이브리드(알루미늄/목재) 디자인을 모두 제공합니다. 전체 알루미늄 베이스는 선명한 어택, 넓은 주파수 응답 및 금속이 매우 낮은 감쇠로 진동을 전달함에 따라 매우 긴 서스테인을 가집니다. 이 브랜드는 또한 독점적인 대형 알루미늄 브릿지와 그들의 악기의 독특한 특성에 맞는 보정된 픽업을 디자인합니다.</p>` },
    { name: "Maurizio Über Basses", country: "이탈리아", region: "europe", tags: ["Ergonomics", "Structure", "Customization"],
        summary: "MÜB는 현대적이고 이동이 잦은 연주자를 위해 베이스를 재창조했습니다. '두뇌 있는 헤드리스' 디자인, 별자리 챔버링, 모듈식 넥 시스템과 같은 기능은 창의적인 해결책으로 일반적인 문제점을 해결하며, 휴대성과 다용성이 톤이나 스타일을 희생하지 않는 독특한 틈새 시장을 개척합니다.",
        details: `<p>마우리치오 카두토의 Maurizio Über Basses (MÜB)는 휴대성, 모듈성 및 인체 공학을 강조합니다. 한 가지 혁신은 시각적 친숙함을 위해 최소한의 헤드스톡 모양을 유지하지만 완벽한 균형을 위해 튜너를 브릿지로 옮기는 <strong>“두뇌 있는 헤드리스”</strong> 디자인입니다. 또 다른 하나는 솔리드 바디 느낌을 유지하면서 무게를 줄이기 위해 다양한 직경의 수많은 구멍을 뚫는 <strong>“별자리” 챔버링</strong> 방법입니다.</p><p>아마도 가장 야심찬 기능은 X3M 및 여행 친화적인 Airborne과 같은 모델의 <strong>교체 가능한 넥 시스템</strong>으로, 넥을 몇 분 만에 분리하고 교체할 수 있어 투어 뮤지션의 꿈을 이룹니다.</p>` },
    { name: "Oroboro Guitars", country: "이탈리아", region: "europe", tags: ["Aesthetics", "Structure"],
        summary: "Oroboro Guitars는 음악적으로 모험심이 강한 사람들과 예술 감정가 모두를 만족시킵니다. Cellflex 셀룰로이드 적용과 같은 새로운 재료와 대담한 디자인을 활용하여 베이스가 형태와 기능 면에서 무엇이 될 수 있는지의 경계를 넓힙니다. 가치는 독점성과 혁신에 있습니다. 단순한 도구가 아니라 규범에 도전하는 성명서입니다.",
        details: `<p>Oroboro Guitars는 악기 제작을 예술 실험으로 취급하여 형태와 재료의 관습을 깨는 <strong>“새로운 개념”</strong>의 베이스를 만드는 아방가르드 워크샵입니다.</p><p>Oroboro의 주요 혁신 중 하나는 <strong>“Cellflex”</strong>라는 독점 기술입니다. 이 특허 공정은 셀룰로이드를 제2의 피부처럼 어떤 표면에나 맞출 수 있는 하이테크 코팅으로 재창조하여 페인트만으로는 불가능한 마감과 질감을 가능하게 합니다. 이는 놀라운 시각 효과뿐만 아니라 보호적이고 공명적인 껍질을 제공합니다. 그들은 또한 수지와 탄소 섬유와 같은 비전통적인 재료를 예술적인 방식으로 사용하는 것으로 알려져 있습니다.</p>` },
    { name: "Sugi Guitars", country: "일본", region: "other", tags: ["Wood", "Aesthetics", "Structure"],
        summary: "Sugi Guitars는 악기를 장기 투자로 보는 안목 있는 연주자를 대상으로 합니다. 정밀한 일본 장인 정신과 재료에 대한 구시대적 접근 방식을 결합하여 Sugi는 현대적인 클래식처럼 느껴지는 베이스를 만들며, 내일의 빈티지 보물이 되도록 오늘 제작됩니다.",
        details: `<p>마스터 루씨어 스기모토 마코토 “닉”이 설립한 Sugi Guitars는 <strong>“미래의 빈티지”</strong> 악기를 만드는 모토로 운영됩니다. 이를 위해 Sugi는 품질과 수명에 끊임없이 집중합니다. 한 기둥은 <strong>최고급 목재</strong>의 광적인 선택으로, 음향적으로 평가되고 종종 안정성을 보장하고 내부 응력을 완화하기 위해 <strong>수년간 자연 건조</strong>됩니다.</p><p>장인 정신은 다른 기둥입니다. 제작 품질은 거의 임상적이며, 일관성을 위해 현대적인 CNC와 프렛 작업 및 샌딩과 같은 세부 사항에 대한 광범위한 수작업 마무리를 혼합하여 사용합니다. 그들의 주력 모델인 <strong>Night Breeze (NB)</strong> 베이스는 이를 잘 보여주며, 종종 멋진 탑과 목재의 자연스러운 특성을 포착하는 투명하면서도 풍부한 톤을 특징으로 합니다.</p>` },
    { name: "Adamovic Basses", country: "네덜란드", region: "europe", tags: ["Ergonomics", "Wood", "Structure"],
        summary: "Adamovic의 지침은 연주자와 악기 간의 물리적 관계입니다. X-ergo 바디 카브부터 체중 감량에 이르기까지 모든 디자인 선택은 최상의 사운드를 제공하면서 편안함을 개선하고 부상을 예방하기 위해 이루어집니다. Adamovic은 베이스가 소리만큼 기분 좋게 느껴질 수 있음을 증명합니다.",
        details: `<p>니콜라 아다모비치가 설립한 Adamovic Basses는 <strong>극도의 인체 공학 및 연주자 편안함</strong>이라는 정신을 바탕으로 제작되었습니다. 이 회사의 기원은 니콜라 자신이 무거운 베이스를 연주하면서 겪은 허리 통증에서 비롯되었습니다. 시그니처 디자인 요소는 연주자의 몸통을 감싸는 뚜렷한 오목한 곡선인 <strong>“X-ergo” 조각된 등</strong>으로, 베이스를 연주자의 무게 중심에 더 가깝게 가져와 완벽한 균형을 보장합니다.</p><p>Adamovic 베이스는 또한 5현의 경우 약 3.7kg에 불과한 가벼운 것으로도 유명하며, 이는 선택적인 챔버링을 통해 달성됩니다. 넥 목재는 수년간 자연 건조되며, 많은 모델에는 극도의 안정성을 위해 흑연 막대가 있는 다중 라미네이트 구조가 특징입니다.</p>` },
    { name: "Aristides Guitars", country: "네덜란드", region: "europe", tags: ["Structure", "Aesthetics"],
        summary: "Aristides Guitars는 재료 우선 철학을 구현합니다. Arium을 만들어 Aristides는 타의 추종을 불허하는 서스테인, 안정적인 톤 및 일관성을 제공하는 악기를 제공합니다. 재료의 혁신이 실질적인 음악적 이점을 낳을 수 있음을 증명하며, 정밀도와 신뢰성을 요구하는 연주자에게 강력하고 미래 지향적인 옵션을 제시합니다.",
        details: `<p>Aristides Guitars는 <strong>재료 과학</strong>에서 시작하여 악기 제작에 대한 급진적인 재고를 나타냅니다. 이 회사의 이야기는 완벽한 음향 특성을 가진 재료를 만들기 위해 델프트 공과대학과 15년간의 연구 프로젝트로 시작됩니다. 그 결과 모든 방향으로 균일하여 3차원으로 공명할 수 있는 독점 복합재인 <strong>Arium</strong>이 탄생했습니다.</p><p>Aristides 악기는 <strong>일체형</strong>입니다: 바디와 넥은 에너지를 잃을 넥 조인트 없이 하나의 연속적인 단위로 성형됩니다. 이는 Arium의 환경 변화에 대한 안정성과 결합하여 매우 긴 서스테인, 풍부한 하모닉스 및 데드 스팟의 거의 제거를 가져옵니다.</p>` },
    { name: "De Gier Basses", country: "네덜란드", region: "europe", tags: ["Structure", "Ergonomics"],
        summary: "De Gier의 Lowlander는 사랑받는 디자인의 구조적 결함을 수정하는 것이 어떻게 그 정신을 잃지 않고 악기를 향상시킬 수 있는지에 대한 사례 연구입니다. Sander de Gier의 '빈티지 분위기와 현대적 신뢰성' 철학은 전통을 존중하지만 엔지니어링 노하우로 개선하는 것을 두려워하지 않습니다.",
        details: `<p>샌더 드 기어가 설립한 De Gier Basses는 빈티지 분위기와 현대 엔지니어링을 결합합니다. 대표적인 예는 깁슨 썬더버드를 재해석한 <strong>Lowlander</strong>입니다. 그는 헤드스톡 각도를 줄이고, 볼류트를 추가하고, 트러스로드 채널을 좁혀 악명 높은 약한 헤드스톡 부분을 강화함으로써 원본의 결함을 해결합니다.</p><p>그는 또한 9겹 라미네이트 넥에 <strong>탄소 섬유 강화 막대</strong>를 추가하고 더 많은 온전한 목재를 남기는 CNC 절단 프렛 슬롯을 사용하여 넥 강성을 향상시킵니다. 균형은 더 가벼운 튜너와 바디용 스페인 삼나무를 사용하여 개선되어 넥 다이브 없이 빈티지 T-bird 그르렁거림을 제공합니다.</p>` },
    { name: "Rikkers Basses", country: "네덜란드", region: "europe", tags: ["Structure", "Aesthetics", "Wood"],
        summary: "Rikkers의 전략은 혁명이 아닌 진화입니다. 유명한 디자인의 약점(넥 강성 등)을 신중한 구조적 개선으로 해결함으로써, 그들은 '항상 사랑했던 베이스, 단지 더 나아졌을 뿐'을 제공하여 빈티지 스타일을 사랑하지만 현대적인 정밀도와 신뢰성을 중시하는 사람들에게 어필합니다.",
        details: `<p>Rikkers Gitaarbouw는 클래식 베이스 디자인에 현대적인 악기 제작 통찰력을 불어넣습니다. 대표적인 예는 <strong>Classicline</strong> 시리즈의 넥 구조입니다. 전통적인 단일 조각 평면 톱질 메이플 대신, Rikkers는 함께 라미네이트된 <strong>두 조각의 쿼터쏜 하드 록 메이플</strong>을 사용합니다. 이는 넥을 구부러지거나 뒤틀리는 것에 더 강하게 만들어 훨씬 더 타이트하고 풍부한 사운드를 제공합니다.</p><p>Rikkers는 또한 <strong>렐릭 마감</strong>에 탁월하여, 숙성된 래커의 미묘한 녹색 변화와 같은 놀라운 디테일로 진정한 “심한 클럽 사용” 시뮬레이션을 만듭니다. 이는 연주자들에게 완전히 새롭고 완벽하게 설정된 악기에서 닳아빠진 미학을 제공합니다.</p>` },
    { name: "Roks Instruments", country: "네덜란드", region: "europe", tags: ["Ergonomics", "Structure", "Aesthetics"],
        summary: "Roks Instruments는 편안함을 부차적인 기능에서 주요 매력으로 승격시킵니다. 말 그대로 베이스를 인체에 맞게 만들고 균형에 집착함으로써 Roks는 긴 공연 동안 그들과 싸우지 않을 악기를 필요로 하는 전문가들에게 어필하는 '인체 공학적 예술'을 만듭니다.",
        details: `<p>Roks Instruments는 인체 공학 및 편안함에 중점을 둔 정신으로 연주자를 "포용"하는 베이스를 만들어 틈새 시장을 개척했습니다. <strong>Idris</strong> 또는 <strong>Futura</strong>와 같은 Roks 베이스는 연주자의 몸통을 감싸기 위해 안쪽으로 구부러지는 감각적으로 <strong>곡선형의 오목한 등</strong>을 가지고 있습니다. 이는 베이스를 안전하고 가깝게 느끼게 하고, 균형을 돕고, 연주자의 손이 자연스러운 연주 위치에 놓이게 합니다.</p><p>인체 공학적 초점은 조심스럽게 조각된 팔걸이, 조각된 힐, 그리고 무게와 부피를 줄이기 위해 약간 축소된 바디로 계속되어 일반적인 부담 없이 몇 시간 동안 연주할 수 있습니다.</p>` },
    { name: "Aviator Guitars", country: "폴란드", region: "europe", tags: ["Customization", "Structure"],
        summary: "Aviator Guitars는 맞춤형 장인 정신과 효율적인 생산 전략의 현명한 조화를 보여줍니다. 제품을 Ace(완전 맞춤형)와 Pilot(세미 맞춤형)으로 나누어 하나의 브랜드 아래에서 두 시장을 효과적으로 공략하며, '부티크'가 사람마다 다른 의미를 가질 수 있음을 인정하면서 높은 품질을 보장합니다.",
        details: `<p>폴란드의 Aviator Guitars는 다양한 고객을 만족시키기 위해 영리한 2단계 전략을 사용합니다. 그들의 철학은 구조화된 방식으로 "당신이 꿈꿀 수 있는 모든 것을 만드는 것"입니다.</p><p><strong>Ace Edition</strong>은 고객이 목재, 전자 제품 및 디자인에 대한 무한한 옵션을 가진 공동 디자이너가 되는 제한 없는 완전 맞춤형 주력 제품입니다. 대조적으로 <strong>Pilot Edition</strong>은 더 접근하기 쉬운 "생산 맞춤형" 라인입니다. Aviator는 인기 있는 구성을 선별하고 제작 과정을 간소화하여 폴란드 작업장의 장인 정신 품질을 손상시키지 않으면서 더 낮은 가격에 제공합니다.</p>` },
    { name: "Maruszczyk Instruments", country: "폴란드", region: "europe", tags: ["Customization", "Wood"],
        summary: "Maruszczyk Instruments는 맞춤형 베이스 경험을 대중화했습니다. 강력한 온라인 구성기와 효율적인 생산 모델은 예산이 부족한 연주자도 꿈의 베이스를 디자인할 수 있음을 의미하며, 기성 공장 베이스와 고급 루씨어 빌드 사이의 격차를 메웁니다.",
        details: `<p>아드리안 마루스치크가 이끄는 Maruszczyk Instruments는 <strong>"플레이어에서 플레이어로"</strong>라는 슬로건 아래 운영되며, 일반적인 맞춤형 빌드보다 훨씬 낮은 가격으로 고객의 손에 창의적인 힘을 실어주는 것을 목표로 합니다.</p><p>이에 대한 핵심은 업계에서 가장 포괄적인 것 중 하나인 광범위한 <strong>온라인 구성기</strong>입니다. 사용자는 기본 모델(J-bass 스타일 <strong>Elwood</strong> 또는 P-스타일 <strong>Jake</strong> 등)로 시작하여 목재부터 Delano 및 Aguilar와 같은 브랜드의 픽업에 이르기까지 거의 모든 측면을 맞춤 설정할 수 있습니다. 입증된 디자인과 규모의 경제에 집중함으로써, 그들은 놀라울 정도로 합리적인 가격에 고급 부품을 갖춘 맞춤형 베이스를 제공할 수 있습니다.</p>` },
    { name: "Mayones Guitars", country: "폴란드", region: "europe", tags: ["Wood", "Aesthetics", "Customization", "Structure"],
        summary: "Mayones는 전통과 현대성을 성공적으로 연결했습니다. 그들은 사랑받는 베이스 원형을 가져와 최고의 목재, 하이테크 하드웨어 및 전자 전문가와의 협력을 통해 강화합니다. 이러한 유산과 진보의 조합은 그들에게 부티크 베이스 제조업체 중 최고의 자리를 차지하게 했습니다.",
        details: `<p>Mayones는 1982년에 설립된 폴란드 가족 기업으로, 록 및 메탈계에서 유명한 국제적인 부티크 강자로 성장했습니다. 그들의 접근 방식은 클래식 공식을 현대화하는 것입니다. 훌륭한 예는 아름다운 탑, 복합 반경 지판 및 강력한 액티브 전자를 특징으로 하는 재즈 베이스의 핫로드 버전인 <strong>Mayones Jabba</strong> 시리즈입니다.</p><p><strong>Comodous</strong>와 같은 넥스루 모델은 끝없는 서스테인을 제공하며 종종 웬지 및 에보니와 같은 이국적인 톤우드를 사용합니다. Periphery 및 Korn과 같은 밴드의 아티스트와의 긴밀한 협력은 그들의 디자인이 전문적인 피드백에 의해 공급되어 신선하고 성능 지향적으로 유지되도록 보장합니다.</p>` },
    { name: "Skervesen Guitars", country: "폴란드", region: "europe", tags: ["Customization", "Ergonomics", "Structure"],
        summary: "Skervesen Guitars는 틈새 시장의 틈새 시장을 공략함으로써 번성합니다. 즉, 기술적 요구와 미적 상상력에 정확히 맞는 맞춤형 악기를 원하는 연주자들입니다. 멀티스케일, 확장 현 및 초현대적 인체 공학과 같은 기능에 특화함으로써 그들의 '어떤 요청도 너무 거칠지 않다'는 접근 방식은 그들을 진보적인 음악 커뮤니티의 최고 선택으로 만들었습니다.",
        details: `<p>Skervesen Guitars는 대담한 디자인과 고도로 개별화된 빌드로 진보적인 메탈 및 젠트 연주자들 사이에서 주목을 받은 폴란드 맞춤형 상점입니다. 그들의 철학은 고객에 대한 <strong>타협 없음</strong>입니다.</p><p>한 가지 특징은 다운튜닝되거나 확장된 베이스에서 더 나은 장력과 선명도에 대한 필요성을 인식하여 많은 모델에서 <strong>멀티스케일(팬 프렛) 디자인</strong>을 채택한 것입니다. 인체 공학도 최전선에 있으며, 극적인 스쿱과 베벨, 그리고 슬림하고 빠른 넥 프로파일이 있습니다. 미학적으로는 수지 채워진 공극이나 LED 사이드 닷과 같은 화려한 터치와 자연스러운 목재 아름다움을 혼합하여 어떤 것도 불가능하지 않음을 증명합니다.</p>` },
    { name: "Stradi Basses", country: "폴란드", region: "europe", tags: ["Ergonomics", "Electronics", "Structure", "Aesthetics"],
        summary: "Stradi Basses는 마치 새로운 악기 범주를 발명하는 것처럼 디자인에 접근합니다: 일부는 일렉트릭 베이스, 일부는 오케스트라 현악기입니다. 확장된 지판으로 인체 공학을 구조적으로 바꾸고 이를 자기/피에조 하이브리드 톤 시스템과 결합함으로써 Stradi는 베이스의 구조와 전자가 어떻게 함께 최적화되어 음악적 경험을 향상시킬 수 있는지 다시 생각합니다.",
        details: `<p>루씨어 마렉 동베크의 Stradi Basses는 전통 악기와 현대 악기의 경계를 허뭅니다. 대표 모델인 <strong>Symphony Bass</strong>의 눈에 띄는 특징은 바디 끝까지 닿는 <strong>확장된 지판</strong>입니다. 이를 통해 브릿지를 재배치하여 연주 위치를 연주자의 몸통에 더 가깝게 이동시켜 스케일 길이를 희생하지 않고 왼손의 편안함을 향상시킬 수 있습니다.</p><p>또 다른 뛰어난 측면은 픽업에 대한 하이브리드 접근 방식입니다. 많은 모델에는 <strong>자기 픽업</strong>(Delano Xtender 등)과 통합 <strong>Stradi 피에조 시스템</strong>이 모두 있어 연주자가 따뜻한 프렛리스 "mwah"에서 굵은 전기적 쿵 소리까지 모든 것을 조절할 수 있습니다.</p>` },
    { name: "Zakrzewski Basses", country: "폴란드", region: "europe", tags: ["Ergonomics", "Electronics", "Structure"],
        summary: "Zakrzewski Basses는 음악가의 이익을 위한 혁신을 보여줍니다. 각진 넥과 높은 탑은 높은 수준의 기술을 더 쉽고 편안하게 만듭니다. 한편, 피에조/마그네틱 픽업을 위한 듀얼 출력과 같은 기능은 전문 연주자를 위한 음향 유연성을 극대화하려는 노력을 강조합니다.",
        details: `<p>마치에이 자크셰프스키의 Zakrzewski Basses는 연주성 향상으로 유명합니다. 특징은 <strong>“높은” 지판과 기울어진 넥 평면</strong>입니다. 넥은 약간의 각도로 설치되고 상단 탑은 경사져 있어 지판이 더 높게 위치합니다. 이는 연주자의 왼손이 더 중립적인 손목 위치로 상단 프렛에 훨씬 쉽게 접근할 수 있게 합니다.</p><p>전자 제품 측면에서 프렛리스 모델에는 종종 자기 및 피에조 신호를 위한 <strong>듀얼 출력</strong>이 제공됩니다. 이를 통해 연주자는 신호를 다른 앰프나 채널로 보내 혼합 및 처리에 놀라운 유연성을 제공할 수 있습니다.</p>` },
    { name: "Benevolent Basses", country: "대한민국", region: "other", tags: ["Aesthetics", "Structure", "Ergonomics"],
        summary: "Benevolent Basses는 두 세계를 성공적으로 통합합니다. 그들은 일렉트릭 베이시스트에게 본격적인 업라이트 베이스를 다루지 않고도 진정한 어쿠스틱 톤과 느낌을 얻을 수 있는 기회를 제공합니다. 핵심 통찰력은 친숙하고 편안한 일렉트릭 패키지로 업라이트 베이스의 유기적이고 표현력이 풍부한 목소리를 전달하는 것입니다.",
        details: `<p>한국 루씨어 정재영의 Benevolent Basses는 <strong>일렉트릭 베이스 바디에 어쿠스틱 업라이트 베이스의 영혼</strong>을 담는 것을 목표로 합니다. 핵심 특징은 스프루스나 시더 탑과 같은 어쿠스틱 톤우드를 사용한 <strong>중공 또는 반중공 구조</strong>로, 종종 사운드홀이 있습니다. 이는 진정한 어쿠스틱 공명을 부여합니다.</p><p>인체 공학적으로는 현장력을 줄이고 연주를 쉽게 하기 위해 종종 더 짧은 32인치 또는 33인치 스케일 길이를 사용합니다. 전자 제품은 복잡한 오버톤과 자연스러운 감쇠를 가진 사운드를 내기 위해 <strong>피에조 픽업</strong>에 크게 의존하며, 많은 모델이 피에조 전용입니다.</p>` },
    { name: "Jerzy Drozd Basses", country: "스페인", region: "europe", tags: ["Aesthetics", "Electronics", "Wood", "Customization"],
        summary: "Jerzy Drozd Basses는 예술과 공학의 합성을 나타냅니다. 유기적이면서도 독특한 디자인 언어(F홀 새 로고로 예시됨)에 전념하고 이를 최고 수준의 독점 전자 제품과 결합함으로써 Jerzy는 놀라운 연주뿐만 아니라 이야기를 전하고 우아함, 혁신 및 독점성을 표현하는 베이스를 만듭니다.",
        details: `<p>바르셀로나에서 제작된 Jerzy Drozd 베이스는 <strong>“예술적 악기의 귀족”</strong>이라는 기치 아래 부티크 악기의 상위 계층을 차지합니다. 그들은 유기적인 디자인 언어를 가지고 있으며, 종종 그의 “새” 로고를 통합한 나무 픽업 커버에서 유명하게 볼 수 있는 <strong>F홀에서 영감을 받은 모티프</strong>를 특징으로 합니다.</p><p>그는 매우 넓은 주파수 응답, 높은 출력 및 투명한 힘을 제공하는 독점 <strong>네오디뮴 픽업(JeDXS 시리즈)</strong>과 일치하는 필터 기반 프리앰프를 개발했습니다. 그의 제작 방법은 다중 라미네이트 넥스루 디자인과 정교한 인레이로 흠 잡을 데가 없어, 유명 연주자들이 사용하고 컬렉션에 전시되는 진정한 예술 작품으로 만듭니다.</p>` },
    { name: "Lorita Basses", country: "스페인", region: "europe", tags: ["Ergonomics", "Structure", "Customization"],
        summary: "Lorita Basses는 헤드리스 디자인과 티타늄 넥 로드와 같은 현대적인 개선 사항을 수용하여 더 나은 악기를 만들면서도 베이시스트가 기대하는 근본적인 느낌을 존중합니다. 이 접근 방식은 매우 연주자 중심적이며 현대적인 디자인과 구식 장인 정신을 결합하여 여전히 집처럼 느껴지는 초현대적인 베이스를 만듭니다.",
        details: `<p>스페인의 사비에르 로리타가 만든 Lorita Basses는 스페인 장인 정신과 현대적인 디자인 정신을 결합합니다. 눈에 띄는 것은 로리타가 <strong>헤드리스</strong> 베이스 영역으로 진출한 <strong>Century Series II</strong>로, Hipshot 하드웨어를 사용하여 균형과 휴대성을 극적으로 향상시킵니다.</p><p>또 다른 특징은 단단한 재와 단풍나무 조합으로 넥을 만들고 <strong>티타늄 보강 로드</strong>를 포함하는 등 고급 재료를 사용하는 것입니다. 티타늄은 강렬한 어택과 서스테인을 위해 놀라운 강성을 제공하지만 강철 무게의 일부에 불과합니다. 전자 제품은 종종 맞춤형 스플릿 코일 픽업과 고품질 Glockenklang 프리앰프를 특징으로 합니다.</p>` },
    { name: "Mattisson Basses", country: "스웨덴", region: "europe", tags: ["Structure", "Ergonomics", "Electronics"],
        summary: "Mattisson의 True Temperament 시스템 채택은 핵심 신념을 강조합니다: 인토네이션과 기본 톤 정확성이 음악적 표현의 기초를 형성한다는 것입니다. 인토네이션 문제를 곡선 프렛으로 정면으로 해결함으로써 Mattisson은 베이시스트가 항상 어디서나 조율된 상태로 연주할 수 있는 악기를 제공하여 순전히 음악성에 집중할 수 있도록 합니다.",
        details: `<p>스웨덴의 안데르스 마티손이 만든 Mattisson Basses는 전체 지판에 걸친 <strong>완벽한 인토네이션</strong>이라는 강박적인 목표에 의해 움직입니다. 이로 인해 그는 <strong>True Temperament 프렛 시스템</strong>을 악기에 통합하게 되었습니다. 안데르스 티델이 개발한 이 시스템은 <strong>곡선 및 물결 모양의 프렛</strong>을 사용하여 지판의 각 음표의 인토네이션을 개별적으로 조정하는 혁신적인 프렛 접근 방식입니다.</p><p>True Temperament을 사용하면 코드가 놀랍도록 순수하게 들리고 전통적으로 충돌하는 음표가 부드럽고 협화적으로 들립니다. 이는 코드 연주 및 세션 작업에 게임 체인저가 될 수 있으며 모든 간격의 기본 정확도를 극대화합니다.</p>` },
    { name: "Alan Cringean Guitars (ACG)", country: "영국", region: "europe", tags: ["Electronics", "Ergonomics", "Structure", "Wood"],
        summary: "ACG는 협업과 혁신을 통해 존경받는 유산을 발전시키는 아이디어를 예시합니다. 앨런 크린진은 클래식(Wal의 전자 제품 개념)의 본질을 취하여 전문가와 협력하여 현대화하고 다용도에서 원본을 능가하는 악기를 만들었으며 동시에 더 접근하기 쉬웠습니다. ACG는 신비나 허세 없이 풍부한 톤 팔레트와 최고 수준의 장인 정신을 제공합니다.",
        details: `<p>스코틀랜드의 1인 기업인 Alan Cringean Guitars(ACG)는 필터 기반 전자 제품으로 존경을 받고 있습니다. ACG 정체성의 초석은 John East와 협력하여 개발한 독특한 전자 제품으로, <strong>ACG/East 듀얼 필터 프리앰프(DFM)</strong>를 만들었습니다. 일반적인 EQ 대신 ACG 베이스에는 각 픽업에 대해 두 개의 스윕 가능한 로우 패스 필터가 있어 매우 정밀한 톤 조각이 가능합니다.</p><p>ACG는 또한 매우 선명하고 펀치감 있는 반응을 내는 맞춤형 <strong>멀티 코일 픽업</strong>(Aaron Armstrong과 협력)을 제공하여 훨씬 더 유연하게 전설적인 Wal과 같은 "그르렁거림"을 달성합니다. 구조는 다중 라미네이트, 탄소 강화 넥 및 인체 공학적 바디 형태로 견고합니다.</p>` },
    { name: "Anaconda Basses", country: "영국", region: "europe", tags: ["Electronics", "Structure", "Aesthetics"],
        summary: "Anaconda Basses는 훌륭한 톤이 고급 재료와 맞춤형 전자 제품의 시너지 효과에서 비롯된다는 점을 강조합니다. 자체 픽업과 프리앰프를 개발함으로써 악기의 목소리가 일관되고 독특하도록 보장합니다. 이 '톤 우선' 철학은 케이스에서 바로 미세 조정된 음향 시그니처를 제공합니다.",
        details: `<p>앤드류 테일러-커밍스가 설립한 Anaconda Basses는 <strong>톤 우선 철학</strong>으로 운영됩니다. 독특한 측면은 <strong>독점 픽업 및 프리앰프</strong> 개발입니다. 예를 들어, 그의 <strong>“TN” (Twin Neo) 시리즈 픽업</strong>은 잡음 제거용으로 설계된 험버커이지만 분할 시 클래식 싱글 코일처럼 들리도록 음성 처리되어 플레이어에게 두 세계의 장점을 모두 제공합니다.</p><p>그들의 독점 EQ 프리앰프는 중립으로 설정했을 때 비교적 투명하고 평탄한 응답을 갖도록 설계되어, 사용된 고품질 목재의 자연스러운 음향을 정직하게 전달하는 미세 조정 도구 역할을 합니다.</p>` },
    { name: "Overwater Basses", country: "영국", region: "europe", tags: ["Wood", "Electronics", "Structure"],
        summary: "Overwater의 기본 원칙은 일렉트릭 베이스를 톤의 음향 소스로 취급하는 것입니다. 목재의 자연스러운 공명에 초점을 맞추고 전자 장치를 투명하게 유지함으로써, 그들은 강요된 목소리보다는 '베이스 자체'를 듣고 싶어하는 연주자들에게 어필합니다. 그들의 베이스는 고급 스튜디오 모니터와 같습니다: 정확하고, 무색이며, 진실합니다.",
        details: `<p>크리스 메이가 이끄는 Overwater Basses는 베이스를 <strong>우선적으로 어쿠스틱 악기</strong>로 보는 관점에서 운영됩니다. 그들은 핵심 톤이 목재와 구조에서 나오며 전자 장치는 단순히 그 자연스러운 톤을 <strong>투명하게 전달</strong>해야 한다고 강조합니다.</p><p>이를 보완하기 위해 Overwater는 EQ가 중립으로 설정되었을 때 의도적으로 <strong>플랫 응답</strong>을 갖도록 자체 독점 전자 패키지를 개발했습니다. Overwater를 플러그를 뽑지 않고 연주하면 크고 선명하게 울립니다. 액티브 회로는 패시브에서 전환할 때 톤에 최소한의 차이가 있도록 음성 처리되어 헤드룸만 더 많아집니다. 이는 특히 세션 베이시스트들 사이에서 인기 있는 환상적인 빈 캔버스로 만듭니다.</p>` },
    { name: "Shuker Basses", country: "영국", region: "europe", tags: ["Customization", "Structure", "Wood"],
        summary: "Shuker Basses는 의뢰 모델로 운영됩니다. 각 악기는 친밀한 협업입니다. 가치는 재판매가 아니라 소유자가 원했던 바로 그것이라는 사실에 있습니다. Shuker는 고객의 꿈의 베이스를 위한 조력자 역할을 하며, 연주자의 정체성이 악기를 형성하도록 합니다.",
        details: `<p>존 슈커의 Shuker Basses는 각 제작의 핵심에 <strong>고객의 비전</strong>이 있는 맞춤형 워크숍입니다. Shuker를 주문할 때 개인 프로젝트를 의뢰하는 것입니다. 철학은 거의 모든 매개 변수의 하이브리드화와 광범위한 조정을 허용하는 <strong>“당신 방식대로 하세요”</strong>입니다.</p><p>Shuker는 독점 전자 제품에 집착하기보다는 고객이 정의한 대로 작업에 가장 적합한 부품(예: Delano 픽업, John East 프리앰프)을 사용하는 구성 요소에 구애받지 않습니다. 이 브랜드는 또한 <strong>The Stranglers의 JJ Burnel</strong>을 위한 시그니처 모델로도 유명합니다.</p>` },
    { name: "Wal Basses", country: "영국", region: "europe", tags: ["Electronics", "Structure", "Wood"],
        summary: "Wal의 지속적인 유산은 베이스를 통합된 음향 시스템으로 보는 아이디어를 강조합니다. 전자 제품을 일반적인 구성 요소로 취급하는 대신 Wal은 특정 목재 및 구조와 함께 작동하도록 처음부터 제작하여 단일하고 틀림없는 목소리를 만들어 냈습니다. 모든 측면을 제어함으로써 그들은 자체적인 톤 범주를 확립한 상징적인 결과를 얻었습니다.",
        details: `<p>Wal Basses는 <strong>독특한 전자 제품 및 픽업</strong>으로 인해 부티크 톤의 성배입니다. Wal 톤의 핵심은 <strong>독점적인 다중 코일 픽업</strong>과 <strong>필터 기반 프리앰프</strong>에 있습니다. 각 픽업에는 각 현에 대해 별도의 코일이 있어(4현 픽업에 8개 코일) 크로스토크를 제거하고 각 현의 진동을 매우 광범위하고 고음질로 포착합니다.</p><p>필터 프리앰프는 각 픽업에 대해 조정 가능한 공진 피크가 있는 스윕 가능한 로우 패스 필터를 특징으로 합니다. 이 강력한 톤 쉐이핑 시스템은 깊은 더빙 베이스에서 공격적이고 절단력 있는 그르렁거림에 이르기까지 모든 것을 생성할 수 있어 게디 리부터 저스틴 챈슬러까지의 아티스트들이 탐내는 시그니처 Wal "홍크"를 만듭니다.</p>` },
    { name: "Alembic Inc.", country: "미국", region: "usa", tags: ["Electronics", "Structure", "Wood"],
        summary: "Alembic은 전자 제품을 악기 목소리의 핵심 부분으로 취급함으로써 베이스가 할 수 있는 일을 극적으로 확장할 수 있음을 보여주었습니다. 그들은 일렉트릭 베이스를 하이파이 오디오 장치로 재창조했으며, 과학과 예술성으로 문제를 해결하는 선구적인 정신이 그들의 유산입니다.",
        details: `<p>1969년에 설립된 Alembic은 <strong>전자 혁신</strong>에 중점을 둔 <strong>부티크 베이스</strong> 혁명을 시작했습니다. 그들은 악기에서 <strong>액티브 전자 장치</strong> 사용을 개척하여 현재 고급 베이스의 표준이 된 것을 발명했습니다. 그들은 Grateful Dead와 Jefferson Airplane의 베이스를 개조하는 것으로 시작했습니다.</p><p>핵심은 신호를 증폭하기 위해 내장 프리앰프와 쌍을 이루는 <strong>저임피던스 픽업</strong>을 사용하여 훨씬 더 큰 선명도와 대역폭을 제공하는 것이었습니다. 그들은 또한 다른 사람들보다 10년 앞서 <strong>필터 기반 톤 컨트롤</strong>을 구현했습니다. 악기 제작 측면에서 그들은 쓰루넥 구조, 다중 라미네이트 넥 및 이국적인 경재를 사용하여 현대적인 고급 베이스의 템플릿을 확립한 최초의 사람들 중 하나였습니다.</p>` },
    { name: "Brubaker Guitars", country: "미국", region: "usa", tags: ["Electronics", "Structure", "Ergonomics", "Customization"],
        summary: "Brubaker의 핵심 혁신은 베이스를 고정된 목소리가 아닌 소리를 위한 모듈식 플랫폼으로 취급하는 것입니다. B.O.B. 시스템은 고급 베이스를 정적인 예술 작품에서 역동적인 톤 플랫폼으로 재구성하여 음악가의 요구가 변화하고 모든 것에 적응할 수 있는 단일 악기를 제공한다는 점을 존중합니다.",
        details: `<p>케빈 브루베이커가 설립한 Brubaker Guitars는 클래식 디자인과 혁신, 특히 전자 모듈성을 결합합니다. 그의 획기적인 공헌 중 하나는 <strong>교체 가능한 프리앰프 모듈</strong> 설정인 <strong>B.O.B. (Boutique On-Board) 시스템</strong>입니다. 프리앰프는 납땜 없이 팝인 및 팝아웃할 수 있는 퀵 커넥트 모듈에 있어 플레이어가 몇 분 만에 베이스의 전체 온보드 사운드를 재구성할 수 있습니다.</p><p>구조 또한 혁신적이며, 확장된 넥 테논과 깊게 조각된 힐을 사용하는 <strong>“Bolt-Thru” 넥 조인트</strong>가 있어 넥스루의 공명과 볼트온의 펀치를 제공합니다.</p>` },
    { name: "Drake Custom Bass", country: "미국", region: "usa", tags: ["Wood", "Aesthetics", "Structure", "Ergonomics"],
        summary: "Drake Custom Bass는 진정한 장인 정신과 지역 정체성의 가치를 강조합니다. 악기의 영혼은 제작자가 불어넣은 영혼에서 비롯됩니다. Drake 베이스는 수작업으로 제작되어 개별 루씨어의 손길, 이야기 및 미국 공예 유산의 한 조각을 중시하는 연주자들에게 어필합니다.",
        details: `<p>앤드류 드레이크가 운영하는 Drake Custom Bass는 "기본적인 수공구와 많은 인력"을 사용하여 <strong>전통적인 수공예 및 개인적인 연결</strong>을 강조하는 부티크 상점입니다. 특징은 <strong>세미 할로우 디자인</strong>과 중간 32인치 스케일 길이에 대한 그의 사랑으로, 더 음향적이고 공명적인 특성을 제공합니다.</p><p>Drake는 지역 역사적인 구조물에서 나온 <strong>100년 이상 된 재생 마호가니</strong>를 포함하여 가능한 한 <strong>지역에서 조달한 목재</strong>를 사용하여 악기에 이야기와 "테루아"를 부여합니다. 그의 악기는 종종 수제 목재 픽가드, 픽업 커버 및 우아한 자기 제어 캐비티 커버와 같은 독특한 터치를 특징으로 합니다.</p>` },
    { name: "Elrick Bass Guitars", country: "미국", region: "usa", tags: ["Structure", "Ergonomics", "Aesthetics"],
        summary: "Elrick Bass Guitars는 과정과 전통이 주요 판매 포인트가 될 수 있음을 강조합니다. Rob Elrick이 고급 라인에 대해 CNC를 거부한 것은 '인간의 손길'과 '구시대 장인 정신'의 내러티브를 만들어 무형의 가치를 더합니다. 이러한 전통 기술과 현대적인 디자인의 조합은 두 세계의 장점을 모두 원하는 연주자들에게 공감을 얻습니다.",
        details: `<p>롭 엘릭의 Elrick Bass Guitars는 현대적인 디자인과 순수주의적 접근 방식을 결합하여 두각을 나타냅니다: 최고급 라인의 경우 CNC 가공 없이 <strong>모든 조각을 끌과 칼로 손으로</strong> 합니다. 이는 골드 및 플래티넘 시리즈를 진정한 "수제" 악기로 포지셔닝하여 구시대의 장인 정신 분위기를 원하는 고객에게 어필합니다.</p><p>주목할만한 인체 공학적 특징은 넥 조인트가 조각되어 사실상 힐이 없는 <strong>“힐리스” 볼트온 디자인</strong>으로, 넥스루 수준의 상단 프렛 접근성을 제공하면서 볼트온의 스냅을 유지합니다. 그의 베이스는 또한 가볍고 느낌과 공명을 향상시키는 손으로 문지른 새틴 마감으로도 유명합니다.</p>` },
    { name: "G. Gould Music", country: "미국", region: "usa", tags: ["Structure", "Aesthetics"],
        summary: "그래파이트 넥과 35인치 스케일의 개척자인 G. Gould Music의 유서 깊은 브랜드는 어떤 환경에서도 신뢰성을 중시하는 투어 뮤지션들에게 사랑받는, 비할 데 없는 안정성과 현대적이고 깨끗한 톤을 가진 악기를 제공합니다.",
        details: `<p>Modulus Graphite의 선구자인 Geoff Gould가 설립한 G. Gould Music은 <strong>카본 그래파이트 넥</strong>을 중심으로 한 혁신의 유산을 이어가고 있습니다. Gould는 양산형 그래파이트 넥과 5현 베이스를 위한 <strong>35인치 스케일 길이</strong>를 개척한 공로를 인정받고 있으며, 이 두 가지 기여는 현대 베이스를 근본적으로 형성했습니다.</p><p>그래파이트 넥은 온도나 습도로 인한 뒤틀림에 영향을 받지 않는 타의 추종을 불허하는 안정성을 제공하며, '데드 스팟'이 없는 선명함이 특징인 독특한 톤을 만들어냅니다. 35인치 스케일은 깨끗하고 강력한 로우 B 현에 필요한 장력을 제공하여 빠르게 업계 표준이 되었습니다. 이 브랜드는 안정성과 현대적인 톤을 우선시하는 연주자들에게 어필합니다.</p>` },
    { name: "Halo Custom Guitars", country: "미국", region: "usa", tags: ["Customization"],
        summary: "Halo의 주요 혁신은 매우 깊이 있고 접근하기 쉬운 온라인 커스터마이징 도구입니다. 이 플랫폼은 연주자들이 사실상의 공동 디자이너가 될 수 있도록 지원하며, 악기의 모든 사양에 대한 완전한 통제를 원하는 연주자들을 위한 최고의 브랜드로 자리매김하게 합니다.",
        details: `<p>Halo Custom Guitars는 강력하고 포괄적인 <strong>온라인 커스터마이징 도구</strong>를 제공함으로써 독특한 시장 위치를 개척했습니다. 이 플랫폼을 통해 사용자는 수십 가지의 바디 모양, 방대한 종류의 목재, 하드웨어 및 전자 부품 중에서 선택하여 꿈의 악기를 처음부터 디자인할 수 있습니다.</p><p>Halo는 최대 10현 기타, 멀티스케일(팬) 프렛, 다양한 헤드리스 모델 옵션을 갖춘 헤비 장르를 위한 현대적인 디자인에 특화되어 있습니다. 고객 리뷰는 완성된 악기의 뛰어난 품질과 복잡한 '드림 빌드'를 현실로 만드는 팀의 능력을 지속적으로 칭찬합니다.</p>` },
    { name: "Kiesel Guitars", country: "미국", region: "usa", tags: ["Customization", "Structure"],
        summary: "Kiesel은 전통과 혁신을 모두 포용하며, 고급 사양의 커스텀 악기를 합리적인 가격에 제공하는 현대적 맞춤형 브랜드로 자리매김했습니다.",
        details: `<p>Kiesel Guitars는 1946년 Carvin으로 출발한 미국의 장인 브랜드로, 현재까지도 가족 경영을 유지하며 캘리포니아에서 모든 악기를 자체 제작하고 있습니다. 커스터마이징을 기반으로 한 공장직영 모델은 가격 대비 품질에서 매우 우수한 평가를 받고 있습니다.</p><p><strong>카본로드 보강 넥</strong>, 스테인리스 프렛, 멀티피스 넥 블랭크 등 안정성과 내구성을 중시하는 설계가 적용되며, 거의 모든 옵션을 사용자가 직접 선택할 수 있습니다. 헤드리스, 멀티스케일, 7~8현 베이스 등 현대적 포맷도 빠르게 수용하고 있습니다.</p><p>Kiesel의 프리앰프 및 픽업은 자체 개발된 것으로, 다양한 음악 장르와 플레이 스타일에 맞춰 음색을 세밀하게 조율할 수 있습니다. 커스터마이징 가능한 J 스타일, PJ, 소프바 타입이 모두 준비돼 있으며, 이국적인 탑우드나 스페셜 피니시도 다양하게 제공됩니다. 무엇보다 생산 속도와 가격대비 커스터마이징 품질의 균형이 뛰어나며, 공장에서 곧바로 고객에게 배송되는 구조로 유저 피드백이 빠르게 반영되는 유연성도 큰 장점입니다.</p>`},
    { name: "Skjold Design Guitars", country: "미국", region: "usa", tags: ["Ergonomics", "Structure", "Wood", "Electronics"],
        summary: "프로 베이시스트에 의해 깊이 있는 연주자 중심 철학을 바탕으로 제작된 Skjold 베이스는 뛰어난 인체 공학, 가벼운 무게 및 다재다능함으로 유명합니다. 이 브랜드는 향상된 공명을 위한 독점적인 '카타콤' 챔버링과 연주자 편의에 대한 전체론적 접근 방식과 같은 혁신으로 정의됩니다.",
        details: `<p>프로 베이시스트 피터 '피트' 스콜드가 설립한 이 브랜드는 음악가들이 진정으로 필요로 하는 것에 대한 내부자의 관점을 바탕으로 제작되었습니다. 핵심 혁신은 여러 구획이 있는 고도로 설계된 기술인 <strong>'카타콤' 챔버링</strong>으로, 연주자가 몸을 통해 느낄 수 있는 거대하고 공명적인 톤을 만들어냅니다.</p><p><strong>전체론적 인체 공학</strong>은 넓은 컷어웨이, 짧은 리치를 위한 전략적인 브릿지 배치, 가벼운 구조 및 일관된 개방현 톤을 위한 제로 프렛 사용을 통해 집착적으로 추구됩니다. 전자 장치는 맞춤형 투명 픽업과 John East가 제작한 맞춤형 프리앰프로 조화를 이루어 톤우드의 자연스러운 목소리를 증폭시킵니다.</p>` },
    { name: "Spector Basses", country: "미국", region: "usa", tags: ["Ergonomics", "Structure", "Electronics"],
        summary: "베이스 역사상 가장 상징적인 디자인 중 하나인 인체 공학적으로 구부러진 NS 바디를 책임지는 전설적인 브랜드입니다. 강력하고 날카로운 '스펙터 그롤', 넥스루 구조, 그리고 록 로열티와의 유산으로 유명한 Spector는 권위 있는 미국 커스텀 샵과 매우 인기 있는 유럽 생산 라인 사이의 격차를 성공적으로 메웁니다.",
        details: `<p>1976년에 설립된 Spector의 역사는 디자이너 네드 스타인버거와의 협력으로 정의되며, 그 결과 혁신적이고 편안한 <strong>NS 곡선 바디</strong>가 탄생했습니다. 이 인체 공학적 형태는 스팅이 The Police의 Synchronicity 투어에서 NS-2 베이스를 사용하면서 성층권으로 발사된 디자인 클래식이 되었습니다.</p><p>Spector는 현대적이고 강력한 사운드를 얻기 위해 액티브 전자를 사용하는 선구자였습니다. 고출력 EMG 픽업과 다재다능한 프리앰프의 조합은 수십 년 동안 록과 메탈의 필수품이었던 시그니처 <strong>'스펙터 그롤'</strong>—타이트하고 펀치감 있는 톤—을 만들어냈습니다. 이 브랜드는 고급 <strong>미국 커스텀 샵</strong>과 체코 공화국에서 제작된 매우 인기 있는 <strong>유로 시리즈</strong>로 넓은 시장에 서비스를 제공합니다.</p>` }
];
        translations.ko.proposalsData = [
            { title: "넥 구조 및 안정성 혁신", content: "13피스 라미네이티드 넥을 더욱 발전시켜, 뒤틀림, 데드 스팟 등의 문제를 획기적으로 줄이고 장기적인 신뢰성을 보장하는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux의 정교한 넥 접합 방식 연구:</strong> Marleaux Consat 모델의 6점 접합 볼트온 방식과 3피스 메이플 넥 구조가 어떻게 안정성과 사운드 전달에 기여하는지 분석하고, 이를 RavenForge 넥 시스템에 적용하여 신뢰도를 높입니다.</li><li><strong>KD Basses의 콘 코어(Cone Core) 연구:</strong> 넥의 뒤틀림, 휘어짐, 데드 스팟 문제를 획기적으로 줄이는 방법을 모색합니다.</li><li><strong>De Gier의 넥 강화 기술 통합:</strong> 탄소 섬유 로드 보강 및 CNC 프렛 슬롯 기술을 통합하여 구조적 강성과 톤 품질을 향상시킵니다.</li><li><strong>Rikkers의 쿼터쏜(Quartersawn) 넥 고려:</strong> 강성과 타이트한 사운드를 연구하여 넥의 음향적 특성을 최적화합니다.</li></ul>`, related: ["Marleaux Basses", "KD Basses", "De Gier Basses", "Rikkers Basses"] },
            { title: "목재 연구 및 지속 가능성 강화", content: "핵심 목재의 품질과 안정성을 극대화하고, 환경적 책임을 브랜드 철학에 통합하여 차별화된 가치를 제공하는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux의 지속 가능성 철학 계승:</strong> Marleaux의 REGIO TONE WOOD (RTW) 이니셔티브와 기후 중립적 목재 조달 방식을 벤치마킹하여, RavenForge의 북유럽 신화 기반 철학과 일치하는 지속 가능한 목재 소싱 전략을 구축합니다.</li><li><strong>Padalka의 목재 관리 철학 도입:</strong> 엄격한 목재 선별, 건조, 안정화 프로세스를 적용하여 핵심 목재의 품질과 안정성을 극대화합니다.</li><li><strong>Warwick의 FSC 인증 및 탄소 중립 생산 벤치마킹:</strong> Warwick의 환경 보호 노력을 참고하여 브랜드의 사회적 책임을 강화합니다.</li></ul>`, related: ["Marleaux Basses", "Padalka Guitars", "Warwick Basses"] },
            { title: "인체 공학 및 연주 편의성 극대화", content: "연주자가 장시간 편안하게 연주하고 악기와 하나가 되는 경험을 제공하기 위해 바디, 넥, 구조 전반의 인체 공학적 설계를 혁신하는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux Consat 모델의 인체 공학적 바디 형태 분석:</strong> 다재다능한 사운드로 유명한 Consat 베이스의 인체 공학적 형태를 심층 분석하여, RavenForge 모델들의 연주 편의성을 개선하는 데 적용합니다.</li><li><strong>Spector 및 Roks의 인체 공학적 바디 디자인 연구:</strong> 바디 윤곽, 무게 중심, 넥 조인트 등을 재설계하여 연주 편의성을 극대화합니다.</li><li><strong>Stradi의 확장된 지판 및 브릿지 위치:</strong> 왼손의 접근성과 전반적인 연주 편의성을 혁신적으로 개선하는 방안을 고려합니다.</li><li><strong>Elrick의 '힐리스(heel-less)' 디자인 적용:</strong> 볼트온 넥 모델에 적용하여 하이 프렛 접근성을 극대화합니다.</li></ul>`, related: ["Marleaux Basses", "Spector Basses", "Roks Instruments", "Stradi Basses", "Elrick Bass Guitars"] },
            { title: "전자장치 및 톤 팔레트 확장", content: "기존 시스템을 넘어선 독점적인 회로나 픽업 구성을 개발하여 브랜드 시그니처 사운드를 구축하고, 음향적 깊이와 다용도성을 높이는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux의 톤 시스템 벤치마킹:</strong> Marleaux BC3 3밴드 EQ(액티브/패시브)와 Delano 쿼드코일 험버커 픽업 조합이 만들어내는 '정의되고 다재다능하며 고귀한 사운드'를 분석하여 RavenForge의 톤 팔레트를 더욱 풍성하게 만듭니다.</li><li><strong>Alembic의 액티브 전자장치 개척 정신:</strong> 독점적인 액티브 회로나 픽업 구성을 개발하여 브랜드 시그니처 사운드를 구축합니다.</li><li><strong>Zakrzewski의 듀얼 출력 시스템:</strong> EMBLA 모델에 적용하여 스튜디오 및 라이브 환경에서 더 큰 음향적 깊이와 창의적인 사운드 디자인을 가능하게 합니다.</li><li><strong>Stradi의 하이브리드 픽업 시스템:</strong> 마그네틱/피에조 통합을 연구하여 톤 팔레트를 확장하고 다용도성을 높입니다.</li></ul>`, related: ["Marleaux Basses", "Alembic Inc.", "Zakrzewski Basses", "Stradi Basses"] },
            { title: "미학적 차별화 및 브랜드 스토리텔링", content: "북유럽 신화 테마를 악기 디자인에 깊이 있게 통합하고, 독특한 마감과 재료를 통해 악기를 '수집 가능한 예술 작품'으로 승화시키는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux의 미학적 가치 및 혁신 스토리텔링 연구:</strong> Marleaux의 '숨 막힐 듯한 희귀 부티크 목재 컬렉션'을 활용한 미학적 가치 창출 방식과, 자연 섬유 직물을 활용한 VARI 공정처럼 전통적 장인정신과 첨단 재료 과학을 융합하는 기술 혁신 스토리를 브랜드에 녹여냅니다.</li><li><strong>Jens Ritter의 예술적 접근 방식:</strong> 한정판 제작, 독특한 인레이 재료, 이야기를 담은 마감을 통해 악기를 문화적 유물과 투자 대상으로 변모시킵니다.</li><li><strong>Sandberg의 정교한 에이징 공정:</strong> Thermo/Vibration Treatment를 연구하여 악기가 시간이 지남에 따라 더욱 풍부하고 성숙한 톤을 제공하도록 보장합니다.</li><li><strong>KD Basses의 안정화 목재 및 모자이크 지판:</strong> 룬 문자 인레이를 더욱 독창적이고 시각적으로 매력적인 요소로 발전시킵니다.</li></ul>`, related: ["Marleaux Basses", "Jens Ritter Instruments", "Sandberg Guitars", "KD Basses"] },
            { title: "생산 및 고객 경험 최적화", content: "현대 기술을 활용하여 고객 참여를 극대화하고, 효율성과 장인정신 사이의 균형을 최적화하여 최상의 고객 경험을 제공하는 것을 목표로 합니다.", details: `<ul><li><strong>Marleaux의 프로 피드백 기반 개선 프로세스 도입:</strong> 전 세계 베이스 프로들의 피드백과 아이디어를 적극적으로 반영하여 제작 공정을 지속적으로 개선하는 Marleaux의 방식을 도입하여, RavenForge가 연주자들과 함께 성장하는 브랜드가 되도록 합니다.</li><li><strong>Halo 및 Maruszczyk의 온라인 컨피규레이터 도입:</strong> 고객이 실시간으로 악기를 디자인하고 시각화할 수 있는 시스템을 구축합니다.</li><li><strong>MÜB의 CNC 활용 철학:</strong> CNC를 '창의적인 도구'로 활용하여 반복적인 작업을 처리하고 장인들이 가치 추가 영역에 집중하도록 합니다.</li></ul>`, related: ["Marleaux Basses", "Halo Custom Guitars", "Maruszczyk Instruments", "Maurizio Über Basses"] }

            const specContentNeck = document.getElementById('spec-content-neck'); 
            const specBtns = document.querySelectorAll('.spec-btn');

            let currentRegionFilter = 'all';
            let currentThemeFilter = 'all';

            function switchLanguage(lang) {
                currentLang = lang;
                sessionStorage.setItem('preferredLang', lang);
                const t = translations[lang];

                // 모든 버튼의 'active' 클래스 제거 (PC, 모바일 모두)
                Object.values(langBtnSets).flat().forEach(btn => {
                    if(btn) btn.classList.remove('active');
                });
                // 현재 언어에 해당하는 버튼(PC, 모바일 모두)에 'active' 클래스 추가
                if(langBtnSets[lang]) {
                    langBtnSets[lang].forEach(btn => {
                        if(btn) btn.classList.add('active');
                    });
                }

                document.documentElement.lang = lang;
                document.title = t.pageTitle;

                document.querySelectorAll('[data-lang-key]').forEach(el => {
                    const key = el.dataset.langKey;
                    if (t[key]) {
                        el.innerHTML = t[key];
                    }
                });

                populateFilters();
                renderAll();
            }
            
            function renderAll() {
                renderSpecSheet();
                renderChart();
                renderLuthiers();
                renderProposals();
            }

            function populateFilters() {
                const t = translations[currentLang];
                regionFilter.innerHTML = Object.entries(t.filterRegions).map(([val, text]) => `<option value="${val}">${text}</option>`).join('');
                themeFilter.innerHTML = Object.entries(t.filterThemes).map(([val, text]) => `<option value="${val}">${text}</option>`).join('');
                
                regionFilter.value = currentRegionFilter;
                themeFilter.value = currentThemeFilter;
            }

            function createSpecTable(data, headers) {
                let table = '<div class="overflow-x-auto"><table class="w-full text-sm spec-table"><thead><tr>';
                headers.forEach(header => {
                    table += `<th class="font-semibold">${header}</th>`;
                });
                table += '</tr></thead><tbody>';
                data.forEach(row => {
                    table += '<tr>';
                    Object.values(row).forEach(cell => {
                        table += `<td>${cell}</td>`;
                    });
                    table += '</tr>';
                });
                table += '</tbody></table></div>';
                return table;
            }

            function renderSpecSheet() {
                const t = translations[currentLang];
                const specData = t.specData;
                const headers = specData.headers;

                specContentEmbla.innerHTML = createSpecTable(specData.embla, headers.embla);
                specContentAskr.innerHTML = createSpecTable(specData.askr, headers.askr);
				specContentEdda.innerHTML = createSpecTable(specData.edda, headers.edda);
                specContentCommon.innerHTML = createSpecTable(specData.common, headers.common);
                specContentNeck.innerHTML = createSpecTable(specData.neck, headers.neck);
            }

            function renderChart() {
                const t = translations[currentLang];
                const luthierData = t.luthierData;
                const themeLabels = t.filterThemes;

                const themeCounts = luthierData.flatMap(l => l.tags).reduce((acc, tag) => {
                    acc[tag] = (acc[tag] || 0) + 1;
                    return acc;
                }, {});
                
                const sortedThemes = Object.keys(themeLabels).filter(key => key !== 'all');

                const chartLabels = sortedThemes.map(tag => themeLabels[tag] || tag);
                const chartData = sortedThemes.map(tag => themeCounts[tag] || 0);
                
                const ctx = document.getElementById('innovationChart').getContext('2d');
                
                if (innovationChart) {
                    innovationChart.destroy();
                }

                innovationChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: t.chartLabel,
                            data: chartData,
                            backgroundColor: 'rgba(59, 130, 246, 0.6)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: t.chartTooltip } }
                        },
                        onClick: (event, elements) => {
                            if (elements.length > 0) {
                                const clickedIndex = elements[0].index;
                                const clickedLabel = sortedThemes[clickedIndex];
                                currentThemeFilter = clickedLabel;
                                themeFilter.value = clickedLabel;
                                renderLuthiers();
                                document.getElementById('analysis').scrollIntoView({ behavior: 'smooth' });
                            }
                        }
                    }
                });
            }

            function renderLuthiers() {
                const t = translations[currentLang];
                const luthierData = t.luthierData;

                luthierGrid.innerHTML = '';
                const filteredLuthiers = luthierData.filter(luthier => {
                    const regionMatch = currentRegionFilter === 'all' || luthier.region === currentRegionFilter;
                    const themeMatch = currentThemeFilter === 'all' || luthier.tags.includes(currentThemeFilter);
                    return regionMatch && themeMatch;
                });

                if (filteredLuthiers.length === 0) {
                    luthierGrid.innerHTML = `<p class="col-span-full text-center text-slate-500">${t.noLuthierMatch}</p>`;
                    return;
                }

                filteredLuthiers.forEach(luthier => {
                    const card = document.createElement('div');
                    card.className = 'bg-white border rounded-lg p-4 shadow-sm hover:shadow-lg transition-shadow cursor-pointer flex flex-col';
                    card.innerHTML = `
                        <div class="flex-grow">
                            <h3 class="text-lg font-bold">${luthier.name}</h3>
                            <p class="text-sm text-slate-500 mb-2">${luthier.country}</p>
                            <p class="text-sm text-slate-600 mb-3">${luthier.summary}</p>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-auto pt-2">
                            ${luthier.tags.map(tag => `<span class="text-xs bg-slate-100 text-slate-800 px-2 py-1 rounded-full">${t.filterThemes[tag] || tag}</span>`).join('')}
                        </div>
                    `;
                    card.addEventListener('click', () => showModal(luthier));
                    luthierGrid.appendChild(card);
                });
            }

            function applyAccordionState() {
                const savedStateJSON = sessionStorage.getItem('openAccordions');
                if (savedStateJSON) {
                    try {
                        const openIndexes = JSON.parse(savedStateJSON);
                        if (Array.isArray(openIndexes)) {
                            document.querySelectorAll('#proposals-accordion .accordion-button').forEach((button, index) => {
                                if (openIndexes.includes(index)) {
                                    button.classList.add('active');
                                    button.querySelector('span:last-child').style.transform = 'rotate(180deg)';
                                }
                            });
                        }
                    } catch (e) {
                        console.error("저장된 아코디언 상태를 불러오는 데 실패했습니다:", e);
                        sessionStorage.removeItem('openAccordions');
                    }
                }
            }
            function renderProposals() {
                const t = translations[currentLang];
                const proposalsData = t.proposalsData;
                const luthierData = t.luthierData;

                proposalsAccordion.innerHTML = '';
                proposalsData.forEach(proposal => {
                    const proposalEl = document.createElement('div');
                    proposalEl.className = 'border rounded-lg';
                    proposalEl.innerHTML = `
                        <button class="accordion-button w-full text-left p-4 bg-stone-100 hover:bg-stone-200 transition flex justify-between items-center font-semibold">
                            <span>${proposal.title}</span>
                            <span class="transform transition-transform duration-300">▼</span>
                        </button>
                        <div class="accordion-content bg-white p-4 border-t">
                            <p class="mb-4">${proposal.content}</p>
                            <div class="prose max-w-none mb-4">${proposal.details}</div>
                            <div class="flex flex-wrap gap-2 items-center">
                                <span class="text-sm font-semibold">${t.relatedLuthiersLabel}</span>
                                ${proposal.related.map(name => `<span class="related-luthier-tag cursor-pointer text-xs bg-sky-100 text-sky-800 px-2 py-1 rounded-full hover:bg-sky-200 transition">${name}</span>`).join('')}
                            </div>
                        </div>
                    `;
                    proposalsAccordion.appendChild(proposalEl);
                });

                document.querySelectorAll('.accordion-button').forEach(button => {
                    button.addEventListener('click', () => {
                        button.classList.toggle('active');
                        button.querySelector('span:last-child').style.transform = button.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
                        
                        const openIndexes = [];
                        document.querySelectorAll('#proposals-accordion .accordion-button').forEach((btn, index) => {
                            if (btn.classList.contains('active')) {
                                openIndexes.push(index);
                            }
                        });
                        sessionStorage.setItem('openAccordions', JSON.stringify(openIndexes));
                    });
                });

                document.querySelectorAll('.related-luthier-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const luthierName = tag.textContent;
                        const luthier = luthierData.find(l => l.name === luthierName);
                        if (luthier) {
                            showModal(luthier);
                        }
                    });
                });
                
                applyAccordionState();
            }

            function showModal(luthier) {
                modalTitle.textContent = `${luthier.name} (${luthier.country})`;
                modalBody.innerHTML = luthier.details;
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.querySelector('.modal-content').classList.remove('scale-95');
                }, 10);
            }

            function hideModal() {
                modal.classList.add('opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    document.body.style.overflow = '';
                }, 300);
            }
            
            const aboutTabBtns = document.querySelectorAll('.about-tab-btn');
            aboutTabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    aboutTabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    sessionStorage.setItem('activeAboutTab', btn.dataset.target);
                    const targetId = `about-content-${btn.dataset.target}`;
                    document.querySelectorAll('.about-content').forEach(content => {
                        content.classList.add('hidden');
                    });
                    const targetContent = document.getElementById(targetId);
                    if (targetContent) {
                        targetContent.classList.remove('hidden');
                    }
                });
            });

            // --- Event Listeners ---
            langEnBtn.addEventListener('click', () => switchLanguage('en'));
            langDeBtn.addEventListener('click', () => switchLanguage('de'));
            langKrBtn.addEventListener('click', () => switchLanguage('ko'));
            langEnBtnFloat.addEventListener('click', () => switchLanguage('en'));
            langDeBtnFloat.addEventListener('click', () => switchLanguage('de'));
            langKrBtnFloat.addEventListener('click', () => switchLanguage('ko'));

            specBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    specBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tabKey = btn.id.replace('btn-spec-', '');
                    sessionStorage.setItem('activeSpecTab', tabKey);
                    const targetId = `spec-content-${tabKey}`;
                    document.querySelectorAll('.spec-content').forEach(content => {
                        content.classList.toggle('hidden', content.id !== targetId);
                    });
                });
            });

            regionFilter.addEventListener('change', (e) => {
                currentRegionFilter = e.target.value;
                renderLuthiers();
            });

            themeFilter.addEventListener('change', (e) => {
                currentThemeFilter = e.target.value;
                renderLuthiers();
            });

            resetFiltersBtn.addEventListener('click', () => {
                currentRegionFilter = 'all';
                currentThemeFilter = 'all';
                regionFilter.value = 'all';
                themeFilter.value = 'all';
                renderLuthiers();
            });

            modalClose.addEventListener('click', hideModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    hideModal();
                }
            });

            const savedSpecTab = sessionStorage.getItem('activeSpecTab');
            if (savedSpecTab) {
                document.querySelectorAll('.spec-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.spec-content').forEach(content => content.classList.add('hidden'));
                const activeBtn = document.getElementById(`btn-spec-${savedSpecTab}`);
                const activeContent = document.getElementById(`spec-content-${savedSpecTab}`);
                if (activeBtn) activeBtn.classList.add('active');
                if (activeContent) activeContent.classList.remove('hidden');
            }

            const savedAboutTab = sessionStorage.getItem('activeAboutTab');
            if (savedAboutTab) {
                document.querySelectorAll('.about-tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.about-content').forEach(content => content.classList.add('hidden'));
                const activeBtn = document.querySelector(`.about-tab-btn[data-target="${savedAboutTab}"]`);
                const activeContent = document.getElementById(`about-content-${savedAboutTab}`);
                if (activeBtn) activeBtn.classList.add('active');
                if (activeContent) activeContent.classList.remove('hidden');
            }

            // --- Initial Load ---
            const initialLang = sessionStorage.getItem('preferredLang') || 'en';
            switchLanguage(initialLang);
        });
        function openImagePopup(imageUrl) {
            const popup = document.getElementById('image-popup');
            const popupImg = document.getElementById('popup-img');
            if (popup && popupImg) {
                popupImg.src = imageUrl;
                popup.classList.remove('hidden');
                setTimeout(() => popup.classList.remove('opacity-0'), 10); // 부드러운 등장을 위한 딜레이
                document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
            }
        }

        function closeImagePopup() {
            const popup = document.getElementById('image-popup');
            if (popup) {
                popup.classList.add('opacity-0');
                setTimeout(() => popup.classList.add('hidden'), 300); // 트랜지션 효과 후 숨김
                document.body.style.overflow = ''; // 배경 스크롤 복원
            }
        }
    </script>
<div id="image-popup" class="modal-overlay fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 hidden z-50 opacity-0" onclick="closeImagePopup()">
    <div class="modal-content bg-white p-2 rounded-lg shadow-xl max-w-4xl max-h-[90vh] relative" onclick="event.stopPropagation()">
        <img id="popup-img" src="" alt="Popup Image" class="max-w-full max-h-[85vh] block">
        <button id="popup-close" class="absolute -top-4 -right-4 text-white bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center text-2xl font-bold hover:bg-slate-600 transition" onclick="closeImagePopup()">&times;</button>
    </div>
</div>
<div class="fixed top-36 right-4 z-30 flex flex-col space-y-2 sm:hidden">
        <button id="lang-en-btn-float" class="lang-btn bg-slate-800 text-white w-14 h-10 rounded-md shadow-lg flex items-center justify-center font-semibold border border-slate-400 hover:bg-slate-700 transition">EN</button>
        <button id="lang-de-btn-float" class="lang-btn bg-slate-800 text-white w-14 h-10 rounded-md shadow-lg flex items-center justify-center font-semibold border border-slate-400 hover:bg-slate-700 transition">DE</button>
        <button id="lang-kr-btn-float" class="lang-btn bg-slate-800 text-white w-14 h-10 rounded-md shadow-lg flex items-center justify-center font-semibold border border-slate-400 hover:bg-slate-700 transition">KR</button>
    </div>
</body>
</html>

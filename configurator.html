          ]
        },
        {

          options: [
            { id: 'coil_1_ps', label: '1 × parallel-series', spec: '(operates both front/rear pickups with one switch)', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 }, isStandard: ['EDDA', 'EMBLA', 'ASKR'] },
            { id: 'coil_1_pcts', label: '1 × parallel-coil tap-series', spec: '(operates both front/rear pickups with one switch)', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 } },
            { id: 'coil_2_ps', label: '2 × parallel-series', spec: '(assigned individually per pickup)', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 } },
            { id: 'coil_2_pcts', label: '2 × parallel-coil tap-series', spec: '(assigned individually per pickup)', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 } },
            { id: 'coil_none', label: 'none', spec: '(connected in series by default)', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 } }
          ]
        },
        {
          id: 'buffer',
          title: 'Buffer',
          dependsOn: { battery: ['bat_9v'] },
          options: [
            { id: 'buffer_none', label: 'none', spec: '', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 }, isStandard: ['EDDA', 'EMBLA', 'ASKR'] },
            { id: 'buffer_delano', label: 'Delano xpure buffer', spec: '(only for 9V)', prices: { EDDA: 100, EMBLA: 100, ASKR: 100 } }
          ]
        },
        {
          id: 'fretboard_extense',
          title: 'Fretboard Extension',
          options: [
            { id: 'extense_none', label: 'none', spec: '', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 }, isStandard: ['EDDA', 'EMBLA', 'ASKR'] },
            { id: 'extense_slap', label: 'slap ramp', spec: '(matching with top)', prices: { EDDA: 100, EMBLA: 100, ASKR: 100 } },
            { id: 'extense_fretless', label: 'fretless extension', spec: '(matching with fretboard)', prices: { EDDA: 100, EMBLA: 100, ASKR: 100 } }
          ]
        },
        {
          id: 'finger_ramp',
          title: 'Finger Ramp',
          options: [
            { id: 'ramp_none', label: 'none', spec: '', prices: { EDDA: 0, EMBLA: 0, ASKR: 0 }, isStandard: ['EDDA', 'EMBLA', 'ASKR'] },
            { id: 'ramp_wood', label: 'wood fingeramp', spec: '(matching with top)', prices: { EDDA: 100, EMBLA: 100, ASKR: 100 } },
            { id: 'ramp_3pickup', label: '3 pickup option', spec: '', prices: { EDDA: 300, EMBLA: 300, ASKR: 300 } }
          ]
        }
      ]
    };

    const App = () => {
      const [selectedModel, setSelectedModel] = useState('EDDA');
      const [selections, setSelections] = useState({});
      const [currentStep, setCurrentStep] = useState(1);
      const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);

      const stepConfig = [
        { step: 1, title: 'Model & Core', categories: ['strings', 'scale'] },
        { step: 2, title: 'Neck & Fretboard', categories: ['headstock_shape', 'headstock_angle', 'nut_size', 'nut_material', 'neck', 'fretboard', 'radius', 'fret_type', 'fret_material', 'fret_size', 'fretline', 'fret_side', 'inlay_type', 'inlay_oval_mat', 'inlay_dot_pos', 'inlay_dot_mat', 'inlay_custom_spec', 'side_dot', 'fretboard_extense'] },
        { step: 3, title: 'Body & Finish', categories: ['body_construction', 'body_wood_single', 'body_core_wood', 'body_wing_wood', 'top_type', 'top_wood_selection', 'color_top', 'color_back_side', 'extra_finish_burst', 'extra_finish_flake', 'color_headstock'] },
        { step: 4, title: 'Hardware', categories: ['hardware_bridge', 'hardware_machine_head', 'knob', 'hardware_color', 'finger_ramp'] },
        { step: 5, title: 'Electronics', categories: ['pickups', 'electronics', 'battery', 'coil_switch', 'buffer'] }
      ];

      const handleNext = () => {
        if (currentStep < 5) setCurrentStep(prev => prev + 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handlePrev = () => {
        if (currentStep > 1) setCurrentStep(prev => prev - 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // Logic to show/hide bridges based on specific rules
      const isBridgeVisible = (bridgeId, modelId, currentSelections) => {
        // 1. EDDA specific filters
        if (modelId === 'EDDA') {
          const allowedEddaBridges = ['ets_custom', 'hipshot_b', 'babicz_top'];
          if (!allowedEddaBridges.includes(bridgeId)) return false;
        }
        // 2. EMBLA specific filters
        if (modelId === 'EMBLA') {
          if (bridgeId.startsWith('kahler_')) return false;
        }
        // 3. Multi-scale common filter
        if (bridgeId === 'kahler_2400' && currentSelections['scale'] === 'multi') return false;

        return true;
      };

      const getDefaultSelections = (modelId) => {
        const defaults = {};
        configData.categories.forEach(category => {
          let stdOption = category.options.find(opt => {
            const baseMatch = opt.isStandard && opt.isStandard.includes(modelId);
            // Extra visibility check for bridge
            if (category.id === 'hardware_bridge') {
              return baseMatch && isBridgeVisible(opt.id, modelId, {});
            }
            return baseMatch;
          });

          if (!stdOption) {
            stdOption = category.options.find(opt => {
              if (category.id === 'top_wood_selection') return true;
              const hasPrice = opt.prices[modelId] !== undefined && opt.prices[modelId] !== null;
              if (category.id === 'hardware_bridge') {
                return hasPrice && isBridgeVisible(opt.id, modelId, {});
              }
              return hasPrice;
            });
          }
          if (stdOption) {
            defaults[category.id] = stdOption.id;
          }
        });
        return defaults;
      };

      useEffect(() => {
        setSelections(getDefaultSelections(selectedModel));
      }, [selectedModel]);

      const summary = useMemo(() => {
        const basePrice = configData.models.find(m => m.id === selectedModel)?.basePrice || 0;
        let extraCosts = 0;
        let requiresRequest = false;
        const breakdown = [];

        configData.categories.forEach(category => {
          if (category.dependsOn) {
            const [depKey, depVal] = Object.entries(category.dependsOn)[0];
            const currentSelection = selections[depKey];
            const isVisible = Array.isArray(depVal) 
              ? depVal.includes(currentSelection) 
              : currentSelection === depVal;
            if (!isVisible) return;
          }

          const optionId = selections[category.id];
          if (optionId) {
            const option = category.options.find(o => o.id === optionId);
            if (option) {
              // Bridge visibility check to prevent calculation
              if (category.id === 'hardware_bridge' && !isBridgeVisible(option.id, selectedModel, selections)) {
                return;
              }

              let price = 0;
              if (category.id === 'top_wood_selection') {
                const topType = selections['top_type'];
                price = option.prices[topType] || 0;
              } else {
                price = option.prices[selectedModel];
              }

              const isRecommended = option.recModels?.includes(selectedModel);
              const recSuffix = isRecommended ? " (*recommended)" : "";
              
              breakdown.push({
                categoryTitle: category.title,
                label: option.label + recSuffix,
                price: price,
                isStandard: option.isStandard && option.isStandard.includes(selectedModel)
              });

              if (typeof price === 'number') {
                extraCosts += price;
              } else if (price === 'request') {
                requiresRequest = true;
              }
            }
          }
        });

        return {
          basePrice,
          extraCosts,
          totalPrice: basePrice + extraCosts,
          requiresRequest,
          breakdown
        };
      }, [selectedModel, selections]);

      const formatPrice = (price, isStd) => {
        if (isStd || price === 0) return 'Included';
        if (price === 'request') return 'Price on Request';
        return `+ €${price}`;
      };

      const handleOptionChange = (categoryId, optionId) => {
        setSelections(prev => {
          const nextSelections = { ...prev, [categoryId]: optionId };

          // [Bug Fix] Automatically select the default ETS Custom bridge
          // if the current bridge is Kahler 2400 when changing to multiscale
          if (categoryId === 'scale' && optionId === 'multi') {
            if (nextSelections['hardware_bridge'] === 'kahler_2400') {
              nextSelections['hardware_bridge'] = 'ets_custom';
            }
          }

          return nextSelections;
        });
      };

      const handleRequestQuote = async () => {
        setIsGeneratingPDF(true);
        const element = document.getElementById('quote-summary-card');
        const scrollArea = document.getElementById('quote-scroll-area');
        const actionsArea = document.getElementById('quote-actions-area');
        const uiHeader = document.getElementById('ui-header');
        const pdfHeader = document.getElementById('pdf-header');
        const listContainer = document.getElementById('quote-list-container');

        // Temporarily modify styles for clean PDF capture
        scrollArea.classList.remove('max-h-[calc(100vh-420px)]', 'min-h-[300px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-2');
        actionsArea.style.display = 'none'; 
        
        // Switch headers for PDF: Summary 유지, 우측에 사명 추가
        uiHeader.style.display = 'none';
        pdfHeader.style.display = 'flex';
        
        // Apply 2-column grid layout: 1페이지에 다 들어가도록 컴팩트한 간격 적용
        listContainer.classList.remove('space-y-3');
        listContainer.classList.add('grid', 'grid-cols-2', 'gap-x-6', 'gap-y-2');

        // DOM이 2열 레이아웃으로 완전히 재배치될 때까지 아주 잠깐 대기
        await new Promise(resolve => setTimeout(resolve, 100));

        const opt = {
          margin:       10,
          filename:     `RavenForge_${selectedModel}_Quote.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
          await html2pdf().set(opt).from(element).save();
        } finally {
          // Restore styles
          scrollArea.classList.add('max-h-[calc(100vh-420px)]', 'min-h-[300px]', 'overflow-y-auto', 'custom-scrollbar', 'pr-2');
          actionsArea.style.display = 'block';
          
          uiHeader.style.display = 'block';
          pdfHeader.style.display = 'none';
          
          listContainer.classList.add('space-y-3');
          listContainer.classList.remove('grid', 'grid-cols-2', 'gap-x-6', 'gap-y-2');

          setIsGeneratingPDF(false);
        }
      };

      return (
        <div className="min-h-screen pb-20 font-sans text-slate-900">
          <header className="bg-slate-900 text-slate-50 sticky top-0 z-50 shadow-md">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <GuitarIcon />
                <h1 className="text-xl font-bold tracking-tight">RavenForge Custom Configurator</h1>
              </div>
              <div className="text-sm text-slate-400 hidden sm:block font-medium">
                Build your dream bass
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              <div className="lg:col-span-8 space-y-8">
                {/* Step Indicator */}
                <div className="flex justify-between items-center mb-4 bg-white rounded-xl p-2 shadow-sm border border-slate-200 overflow-x-auto custom-scrollbar">
                  {stepConfig.map(s => (
                    <button 
                      key={s.step} 
                      onClick={() => { setCurrentStep(s.step); window.scrollTo({ top: 0, behavior: 'smooth' }); }} 
                      className={`flex-1 min-w-[110px] text-center pb-3 pt-3 px-2 border-b-4 transition-all duration-200 ${currentStep === s.step ? 'border-red-700 text-red-700' : 'border-transparent text-slate-400 hover:text-slate-600 hover:border-slate-300'}`}
                    >
                      <div className="text-[10px] font-black uppercase tracking-widest mb-1">Step {s.step}</div>
                      <div className="text-xs font-bold sm:text-sm">{s.title}</div>
                    </button>
                  ))}
                </div>

                <div className="bg-white rounded-2xl shadow-sm border-2 border-slate-200 p-6 sm:p-8">
                  <div className="mb-8 border-b-2 border-slate-100 pb-4">
                    <h2 className="text-2xl font-black text-slate-900">
                      {stepConfig.find(s => s.step === currentStep)?.title}
                    </h2>
                  </div>

                  {/* 1. Select Model (Only visible in Step 1) */}
                  {currentStep === 1 && (
                    <section className="mb-10">
                      <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                        <span className="bg-slate-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2">1</span>
                        Select Model
                      </h3>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        {configData.models.map(model => (
                          <button
                            key={model.id}
                            onClick={() => setSelectedModel(model.id)}
                            className={`relative p-6 rounded-xl border-2 text-left transition-all duration-200 
                              ${selectedModel === model.id 
                                ? 'border-red-700 bg-red-50 shadow-md' 
                                : 'border-slate-200 bg-white hover:border-red-700/50 hover:bg-slate-50'}`}
                          >
                            {selectedModel === model.id && (
                              <div className="absolute top-4 right-4 text-red-700">
                                <CheckIcon />
                              </div>
                            )}
                            <h3 className="text-xl font-bold text-slate-900">{model.name}</h3>
                            <p className="text-sm text-slate-500 mt-1 mb-4">{model.desc}</p>
                            <div className="text-lg font-semibold text-slate-800">
                              €{model.basePrice}
                            </div>
                          </button>
                        ))}
                      </div>
                    </section>
                  )}

                  {/* Categories for Current Step */}
                  <section>
                    {currentStep === 1 && (
                      <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                        <span className="bg-slate-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2">2</span>
                        Core Specifications
                      </h3>
                    )}
                    <div className="space-y-6">
                      {configData.categories
                        .filter(cat => stepConfig.find(s => s.step === currentStep).categories.includes(cat.id))
                        .map(category => {
                          if (category.dependsOn) {
                            const [depKey, depVal] = Object.entries(category.dependsOn)[0];
                            const currentSelection = selections[depKey];
                            const isVisible = Array.isArray(depVal) 
                              ? depVal.includes(currentSelection) 
                              : currentSelection === depVal;
                            if (!isVisible) return null;
                          }

                          const availableOptions = category.options.filter(
                            opt => {
                              if (category.id === 'top_wood_selection') return true;
                              // Bridge special filtering
                              if (category.id === 'hardware_bridge') {
                                return isBridgeVisible(opt.id, selectedModel, selections);
                              }
                              return opt.prices[selectedModel] !== undefined && opt.prices[selectedModel] !== null;
                            }
                          );

                          return (
                            <div key={category.id} className="bg-white rounded-xl border-2 border-slate-200 overflow-hidden shadow-sm">
                              <div className="bg-slate-100 px-6 py-4 border-b-2 border-slate-200">
                                <h3 className="text-lg font-bold text-slate-800">{category.title}</h3>
                              </div>
                              <div className="p-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  {availableOptions.map(option => {
                                    const isSelected = selections[category.id] === option.id;
                                    const isStandardOpt = option.isStandard && option.isStandard.includes(selectedModel);
                                    const isRecommended = option.recModels?.includes(selectedModel);
                                    
                                    let price = 0;
                                    if (category.id === 'top_wood_selection') {
                                      price = option.prices[selections['top_type']] || 0;
                                    } else {
                                      price = option.prices[selectedModel];
                                    }
                                    
                                    return (
                                      <label 
                                        key={option.id}
                                        className={`flex items-start p-4 border-2 rounded-lg cursor-pointer transition-colors duration-200 
                                          ${isSelected 
                                            ? 'border-red-700 bg-red-50 shadow-sm' 
                                            : 'border-slate-200 hover:border-slate-400 hover:bg-slate-50'}`}
                                      >
                                        <div className="flex items-center h-5">
                                          <input 
                                            type="radio" 
                                            name={category.id} 
                                            value={option.id}
                                            checked={isSelected}
                                            onChange={() => handleOptionChange(category.id, option.id)}
                                            className="w-4 h-4 text-red-700 border-slate-300 focus:ring-red-700"
                                          />
                                        </div>
                                        <div className="ml-3 flex-1">
                                          <div className="flex justify-between items-start">
                                            <div>
                                              <span className={`text-sm font-semibold ${isSelected ? 'text-red-700' : 'text-slate-700'}`}>
                                                <FormattedText text={option.label} />
                                              </span>
                                              {isStandardOpt && (
                                                <span className="ml-2 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-slate-800 text-white uppercase">
                                                  Standard
                                                </span>
                                              )}
                                            </div>
                                            <span className={`text-xs font-medium ml-2 shrink-0 ${
                                              isStandardOpt || price === 0 ? 'text-slate-400' : 
                                              price === 'request' ? 'text-yellow-600 font-bold' : 'text-red-700'
                                            }`}>
                                              {formatPrice(price, isStandardOpt)}
                                            </span>
                                          </div>
                                          {(option.spec || isRecommended) && (
                                            <p className="text-xs text-slate-500 mt-1">
                                              {option.spec && <FormattedText text={option.spec} />}
                                              {isRecommended && <FormattedText text=" (*recommended)" />}
                                            </p>
                                          )}
                                        </div>
                                      </label>
                                    );
                                  })}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                    </div>
                  </section>

                  {/* Step Navigation Buttons */}
                  <div className="mt-8 pt-6 border-t-2 border-slate-100 flex justify-between items-center">
                    <button
                      onClick={handlePrev}
                      disabled={currentStep === 1}
                      className={`px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-wider transition-all duration-200 
                        ${currentStep === 1 ? 'opacity-0 cursor-default' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                    >
                      Previous
                    </button>
                    <button
                      onClick={handleNext}
                      disabled={currentStep === 5}
                      className={`px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-wider transition-all duration-200 
                        ${currentStep === 5 ? 'opacity-0 cursor-default' : 'bg-slate-900 text-white hover:bg-slate-800 shadow-md hover:shadow-lg'}`}
                    >
                      Next Step
                    </button>
                  </div>
                </div>
              </div>

              {/* Right Summary Table */}
              <div className="lg:col-span-4">
                <div id="quote-summary-card" className="sticky top-24 bg-white rounded-xl shadow-xl border-2 border-slate-200 overflow-hidden">
                  
                  {/* Web UI Header */}
                  <div id="ui-header" className="bg-slate-900 p-6 text-white border-b-2 border-slate-800">
                    <h3 className="text-xl font-bold uppercase tracking-tight">Summary</h3>
                    <div className="text-slate-400 text-sm mt-1">{selectedModel} Custom Build</div>
                  </div>
                  
                  {/* PDF Only Header */}
                  <div id="pdf-header" style={{display: 'none'}} className="bg-slate-900 p-6 text-white border-b-2 border-slate-800 justify-between items-center">
                    <div>
                      <h3 className="text-xl font-bold uppercase tracking-tight">Summary</h3>
                      <div className="text-slate-400 text-xs mt-1">{selectedModel} Custom Build</div>
                    </div>
                    <div className="text-right">
                      <h2 className="text-sm font-black uppercase tracking-widest text-slate-100">RavenForge</h2>
                      <p className="text-[9px] font-bold tracking-widest text-red-500 mt-0.5">Luthier Intelligence™</p>
                    </div>
                  </div>
                  
                  <div className="p-6">
                    <div id="quote-scroll-area" className="mb-6 max-h-[calc(100vh-420px)] min-h-[300px] overflow-y-auto pr-2 text-sm custom-scrollbar">
                      <div className="flex justify-between pb-2 mb-4 border-b-2 border-slate-100">
                        <span className="text-slate-500 font-bold uppercase text-xs">Base Model ({selectedModel})</span>
                        <span className="text-slate-900 font-bold">€{summary.basePrice}</span>
                      </div>
                      
                      {/* Breakdown List Container */}
                      <div id="quote-list-container" className="space-y-3">
                        {summary.breakdown.map((item, idx) => (
                          <div key={idx} className="flex justify-between items-start py-0.5">
                            <div className="pr-2 text-slate-600">
                              <div className="text-[9px] text-slate-400 font-bold uppercase tracking-wider leading-none mb-0.5">{item.categoryTitle.split('(')[0].trim()}</div>
                              <div className="leading-tight text-xs mt-0.5">
                                <FormattedText text={item.label} />
                              </div>
                            </div>
                            <div className="shrink-0 text-slate-900 font-medium text-right text-xs">
                              {item.isStandard || item.price === 0 ? <span className="text-slate-300">-</span> : 
                               item.price === 'request' ? <span className="text-yellow-600 font-bold">Req</span> : 
                               `€${item.price}`}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="pt-4 border-t-2 border-slate-200">
                      <div className="flex justify-between items-end mb-2">
                        <span className="text-slate-500 font-bold uppercase text-xs">Total (RRP)</span>
                        <span className="text-3xl font-black text-slate-900">
                          €{summary.totalPrice}
                        </span>
                      </div>
                      
                      {summary.requiresRequest && (
                        <div className="flex items-start mt-4 p-3 bg-yellow-50 rounded-lg text-yellow-800 text-[12px] leading-relaxed border border-yellow-200">
                          <div className="mr-2 mt-0.5 shrink-0"><InfoIcon /></div>
                          <p>Some options are selected as <strong>'On Request'</strong>, so the total price may vary upon ordering.</p>
                        </div>
                      )}
                    </div>

                    <div id="quote-actions-area">
                      <button 
                        className={`w-full mt-6 text-white font-bold py-4 px-4 rounded-xl transition-all duration-200 shadow-lg flex justify-center items-center uppercase tracking-widest text-sm ${isGeneratingPDF ? 'bg-slate-400 cursor-wait' : 'bg-red-700 hover:bg-red-800 active:transform active:scale-95'}`}
                        onClick={handleRequestQuote}
                        disabled={isGeneratingPDF}
                      >
                        {isGeneratingPDF ? 'Generating PDF...' : 'Request Quote (Save PDF)'}
                      </button>
                      <p className="text-center text-[11px] text-slate-400 mt-4 leading-tight">
                        * The above amount is the RRP (Recommended Retail Price),<br/>and does not include customs duties and shipping fees.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    };

    // Render React App to DOM
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
